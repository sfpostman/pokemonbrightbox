$kind: http-request
description: |-
  Retrieve a paginated list of all Pokémon in the Pokédex.

  ## Query parameters
  - `limit` (integer, optional) — Number of records to return. Default `20`. Min `1`, max `100`.
  - `offset` (integer, optional) — Number of records to skip from the beginning. Default `0`.

  ## Responses
  - `200 OK` — Returns an object with pagination metadata and the list of Pokémon:
    ```json
    {
      "total": 1025,
      "limit": 20,
      "offset": 0,
      "data": [
        {
          "number": "0001",
          "name": "Bulbasaur",
          "type": "Grass/Poison",
          "total": 318,
          "hp": 45,
          "attack": 49,
          "defense": 49,
          "sp_atk": 65,
          "sp_def": 65,
          "speed": 45
        }
      ]
    }
    ```

  ## Example
  `GET {{baseUrl}}/pokemon?limit=20&offset=0` returns the first 20 Pokémon starting from Bulbasaur.
url: "{{baseUrl}}/pokemon?limit=20&offset=0"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: limit
    value: "20"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 20,
            "minimum": 1,
            "maximum": 100
          }
        }
      }
  - key: offset
    value: "0"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 0,
            "minimum": 0
          }
        }
      }
body:
  type: text
  content: ""
examples: ./.resources/List all Pokemon.resources/examples
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
order: 1000

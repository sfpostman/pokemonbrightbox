$kind: http-request
description: |-
  Create a new Pokémon record in the Pokédex.

  ## Request body (JSON)
  | Field   | Type    | Required | Description                                              |
  |---------|---------|----------|----------------------------------------------------------|
  | number  | string  | Yes      | Pokédex number, zero-padded (e.g. `"1025"`). Acts as the unique key. |
  | name    | string  | Yes      | Pokémon name.                                            |
  | type    | string  | Yes      | Single or dual type, slash-separated (e.g. `"Poison/Ghost"`). |
  | total   | integer | No       | Sum of base stats.                                       |
  | hp      | integer | No       | Hit points base stat.                                    |
  | attack  | integer | No       | Attack base stat.                                        |
  | defense | integer | No       | Defense base stat.                                       |
  | sp_atk  | integer | No       | Special Attack base stat.                                |
  | sp_def  | integer | No       | Special Defense base stat.                               |
  | speed   | integer | No       | Speed base stat.                                         |

  ## Responses
  - `201 Created` — Returns the newly created Pokémon record (as stored in the database).
  - `400 Bad Request` — `{ "error": "number, name, and type are required" }` when one of the required fields is missing.

  ## Example
  ```json
  {
    "number": "1025",
    "name": "Pecharunt",
    "type": "Poison/Ghost",
    "total": 600,
    "hp": 88,
    "attack": 88,
    "defense": 160,
    "sp_atk": 88,
    "sp_def": 88,
    "speed": 88
  }
  ```
url: "{{baseUrl}}/pokemon"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "number": "1025",
      "name": "Pecharunt",
      "type": "Poison/Ghost",
      "total": 600,
      "hp": 88,
      "attack": 88,
      "defense": 160,
      "sp_atk": 88,
      "sp_def": 88,
      "speed": 88
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "number": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "type": {
          "type": "string"
        },
        "total": {
          "type": "integer"
        },
        "hp": {
          "type": "integer"
        },
        "attack": {
          "type": "integer"
        },
        "defense": {
          "type": "integer"
        },
        "sp_atk": {
          "type": "integer"
        },
        "sp_def": {
          "type": "integer"
        },
        "speed": {
          "type": "integer"
        }
      },
      "required": [
        "number",
        "name",
        "type"
      ]
    }
examples: ./.resources/Create a new Pokemon.resources/examples
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });
order: 2000

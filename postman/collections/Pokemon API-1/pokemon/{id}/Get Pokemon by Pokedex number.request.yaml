$kind: http-request
url: "{{baseUrl}}/pokemon/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "0001"
    description: Pokédex number (zero-padded, e.g. 0001)
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
examples: ./.resources/Get Pokemon by Pokedex number.resources/examples
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
order: 1000

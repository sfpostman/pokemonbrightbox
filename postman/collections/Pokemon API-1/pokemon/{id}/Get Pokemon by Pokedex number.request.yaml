$kind: http-request
url: "{{baseUrl}}/pokemon/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "0006"
    description: Pokédex number (zero-padded, e.g. 0006)
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
examples: ./.resources/Get Pokemon by Pokedex number.resources/examples
order: 1000

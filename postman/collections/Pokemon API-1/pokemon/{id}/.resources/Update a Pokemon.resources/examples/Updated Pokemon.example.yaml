$kind: http-example
request:
  url: "{{baseUrl}}/pokemon/:id"
  method: PATCH
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "0006"
      description: Pokédex number (zero-padded, e.g. 0006)
  body:
    type: json
    content: |-
      {
        "hp": 100,
        "speed": 120
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "number": "0006",
        "name": "Charizard",
        "type": "Fire/Flying",
        "total": 534,
        "hp": 78,
        "attack": 84,
        "defense": 78,
        "sp_atk": 109,
        "sp_def": 85,
        "speed": 100
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "number": {
            "type": "string",
            "example": "0006"
          },
          "name": {
            "type": "string",
            "example": "Charizard"
          },
          "type": {
            "type": "string",
            "example": "Fire/Flying"
          },
          "total": {
            "type": "integer",
            "example": 534
          },
          "hp": {
            "type": "integer",
            "example": 78
          },
          "attack": {
            "type": "integer",
            "example": 84
          },
          "defense": {
            "type": "integer",
            "example": 78
          },
          "sp_atk": {
            "type": "integer",
            "example": 109
          },
          "sp_def": {
            "type": "integer",
            "example": 85
          },
          "speed": {
            "type": "integer",
            "example": 100
          }
        }
      }

$kind: http-example
request:
  url: "{{baseUrl}}/pokemon/:id"
  method: PATCH
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: "0006"
      description: Pokédex number (zero-padded, e.g. 0006)
  body:
    type: json
    content: |-
      {
        "hp": 100,
        "speed": 120
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "Pokemon not found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "string"
          }
        }
      }
order: 3000

$kind: http-request
description: |-
  Delete a Pokémon from the Pokédex by its Pokédex number.

  ## Path parameters
  - `id` (string, required) — The Pokédex number of the Pokémon to delete, zero-padded (e.g. `0006`).

  ## Responses
  - `204 No Content` — The Pokémon was deleted successfully. The response body is empty.
  - `404 Not Found` — `{ "error": "Pokemon not found" }` when no Pokémon matches the provided number.

  ## Example
  `DELETE {{baseUrl}}/pokemon/0006` removes Charizard from the database.
url: "{{baseUrl}}/pokemon/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "0006"
    description: Pokédex number (zero-padded, e.g. 0006)
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
examples: ./.resources/Delete a Pokemon.resources/examples
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
order: 3000

$kind: http-request
url: "{{baseUrl}}/pokemon/:id"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "0006"
    description: Pokédex number (zero-padded, e.g. 0006)
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "hp": 100,
      "speed": 120
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "type": {
          "type": "string"
        },
        "total": {
          "type": "integer"
        },
        "hp": {
          "type": "integer"
        },
        "attack": {
          "type": "integer"
        },
        "defense": {
          "type": "integer"
        },
        "sp_atk": {
          "type": "integer"
        },
        "sp_def": {
          "type": "integer"
        },
        "speed": {
          "type": "integer"
        }
      }
    }
examples: ./.resources/Update a Pokemon.resources/examples
order: 2000

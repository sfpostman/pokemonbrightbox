$kind: http-request
description: |-
  Partially update an existing Pokémon. Only the fields included in the request body will be updated.

  ## Path parameters
  - `id` (string, required) — The Pokédex number of the Pokémon to update, zero-padded (e.g. `0006`).

  ## Request body (JSON)
  Any subset of the following fields can be supplied. The `number` field cannot be changed via this endpoint.
  | Field   | Type    | Description                |
  |---------|---------|----------------------------|
  | name    | string  | Pokémon name.              |
  | type    | string  | Type, slash-separated.     |
  | total   | integer | Sum of base stats.         |
  | hp      | integer | Hit points base stat.      |
  | attack  | integer | Attack base stat.          |
  | defense | integer | Defense base stat.         |
  | sp_atk  | integer | Special Attack base stat.  |
  | sp_def  | integer | Special Defense base stat. |
  | speed   | integer | Speed base stat.           |

  ## Responses
  - `200 OK` — Returns the updated Pokémon record.
  - `400 Bad Request` — `{ "error": "No valid fields to update" }` when the body contains none of the allowed fields.
  - `404 Not Found` — `{ "error": "Pokemon not found" }` when no Pokémon matches the provided number.

  ## Example
  `PATCH {{baseUrl}}/pokemon/0006` with body:
  ```json
  { "hp": 100, "speed": 120 }
  ```
  updates Charizard's HP and Speed and returns the updated record.
url: "{{baseUrl}}/pokemon/:id"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: "0006"
    description: Pokédex number (zero-padded, e.g. 0006)
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "hp": 100,
      "speed": 120
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "type": {
          "type": "string"
        },
        "total": {
          "type": "integer"
        },
        "hp": {
          "type": "integer"
        },
        "attack": {
          "type": "integer"
        },
        "defense": {
          "type": "integer"
        },
        "sp_atk": {
          "type": "integer"
        },
        "sp_def": {
          "type": "integer"
        },
        "speed": {
          "type": "integer"
        }
      }
    }
examples: ./.resources/Update a Pokemon.resources/examples
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
order: 2000

$kind: collection
name: Pokemon API
description: |-
  # Pokemon API

  A RESTful API for retrieving and managing Pokémon data sourced from the Pokédex. The collection covers full CRUD operations on Pokémon plus a small Types service for browsing Pokémon by elemental type.

  ## Base URL
  All requests use the `{{baseUrl}}` collection variable, which defaults to `http://localhost:3000` (the local API Gateway).

  ## Architecture
  Requests are routed through an API Gateway (`localhost:3000`) which proxies to two microservices:
  - **Pokemon Service** (`localhost:3001`) — CRUD operations on Pokémon (`/pokemon` routes)
  - **Types Service** (`localhost:3002`) — Type listings and filtering (`/types` routes)

  ## Authentication
  None. The local services do not require authentication. Requests inherit the collection-level auth (no auth) unless overridden at the request level.

  ## Pagination
  List endpoints support the following query parameters:
  - `limit` — number of items to return (default: `20`, min: `1`, max: `100`)
  - `offset` — number of items to skip (default: `0`, min: `0`)

  ## Pokémon resource shape
  Each Pokémon record has the following fields:
  | Field   | Type    | Description                                              |
  |---------|---------|----------------------------------------------------------|
  | number  | string  | Pokédex number, zero-padded (e.g. `"0001"`). Primary key. |
  | name    | string  | Pokémon name (e.g. `"Bulbasaur"`).                        |
  | type    | string  | Single or dual type, slash-separated (e.g. `"Grass/Poison"`). |
  | total   | integer | Sum of base stats.                                       |
  | hp      | integer | Hit points base stat.                                    |
  | attack  | integer | Attack base stat.                                        |
  | defense | integer | Defense base stat.                                       |
  | sp_atk  | integer | Special Attack base stat.                                |
  | sp_def  | integer | Special Defense base stat.                               |
  | speed   | integer | Speed base stat.                                         |

  Example record (CSV row): `0001,Bulbasaur,Grass/Poison,318,45,49,49,65,65,45`.

  ## Endpoints

  ### `pokemon` folder — CRUD on Pokémon
  - `GET    /pokemon` — List all Pokémon (paginated).
  - `POST   /pokemon` — Create a new Pokémon.
  - `GET    /pokemon/:id` — Get a single Pokémon by Pokédex number.
  - `PATCH  /pokemon/:id` — Partially update a Pokémon.
  - `DELETE /pokemon/:id` — Delete a Pokémon.

  ### `types` folder — Type catalog and filtering
  - `GET /types` — List all distinct elemental types.
  - `GET /types/:type/pokemon` — List all Pokémon matching a given type (paginated).

  ## Common error responses
  - `400 Bad Request` — Missing required fields on create, or no valid fields on update.
  - `404 Not Found` — `Pokemon not found` for `/pokemon/:id`, or `No Pokemon found for type: <type>` for `/types/:type/pokemon`.
variables:
  baseUrl: http://localhost:3000

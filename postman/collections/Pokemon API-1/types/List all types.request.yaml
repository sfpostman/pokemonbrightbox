$kind: http-request
description: |-
  Retrieve the list of all distinct Pokémon elemental types currently represented in the Pokédex.

  Dual-type Pokémon (e.g. `Grass/Poison`) are split on `/`, so each component type is reported separately. Results are de-duplicated and sorted alphabetically.

  ## Query parameters
  None.

  ## Responses
  - `200 OK` — Returns an object with the total count and the sorted list of type names:
    ```json
    {
      "total": 18,
      "data": ["Bug", "Dark", "Dragon", "Electric", "Fairy", "Fighting", "Fire", "Flying", "Ghost", "Grass", "Ground", "Ice", "Normal", "Poison", "Psychic", "Rock", "Steel", "Water"]
    }
    ```

  ## Example
  `GET {{baseUrl}}/types` returns the full catalog of unique types.
url: "{{baseUrl}}/types"
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
examples: ./.resources/List all types.resources/examples
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
order: 1000

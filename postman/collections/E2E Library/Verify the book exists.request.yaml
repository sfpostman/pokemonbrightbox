$kind: http-request
url: "{{baseUrl}}/books/:id"
method: GET
headers:
  x-mock-response-code: "200"
  Accept: application/json
pathVariables:
  id: "{{bookId}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response body has required fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.all.keys("id", "title", "author", "genre", "yearPublished", "checkedOut", "isPermanentCollection", "createdAt");
      });

      pm.test("Returned book id matches bookId variable", function () {
          pm.expect(pm.response.json().id).to.eql(pm.collectionVariables.get("bookId"));
      });
    language: text/javascript
order: 3000

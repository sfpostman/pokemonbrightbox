$kind: http-request
description: |-
  Checks out a book by updating its `checkedOut` status to `true`.

  Uses the `bookId` collection variable set by the "Create a new book" request. This is the final step in the E2E workflow, confirming that a book can be successfully checked out after being created and verified.

  **Tests run:**
  - Status code is `200`
  - Response has `application/json` content type
  - `checkedOut` is `true` in the response
  - Returned `id` matches the `bookId` collection variable
url: "{{baseUrl}}/books/:id"
method: PATCH
headers:
  x-mock-response-code: "200"
  Content-Type: application/json
  Accept: application/json
pathVariables:
  id: "{{bookId}}"
body:
  type: json
  content: |-
    {
      "checkedOut": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("checkedOut is true after checkout", function () {
          pm.expect(pm.response.json().checkedOut).to.be.true;
      });

      pm.test("Checked out book id matches bookId variable", function () {
          pm.expect(pm.response.json().id).to.eql(pm.collectionVariables.get("bookId"));
      });
    language: text/javascript
order: 4000

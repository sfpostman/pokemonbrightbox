$kind: http-request
url: "{{baseUrl}}/books/:id"
method: PATCH
headers:
  x-mock-response-code: "200"
  Content-Type: application/json
  Accept: application/json
pathVariables:
  id: "{{bookId}}"
body:
  type: json
  content: |-
    {
      "checkedOut": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("checkedOut is true after checkout", function () {
          pm.expect(pm.response.json().checkedOut).to.be.true;
      });

      pm.test("Checked out book id matches bookId variable", function () {
          pm.expect(pm.response.json().id).to.eql(pm.collectionVariables.get("bookId"));
      });
    language: text/javascript
order: 4000

$kind: http-request
url: "{{baseUrl}}/books"
method: GET
headers:
  x-mock-response-code: "500"
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response is an array", function () {
          pm.expect(pm.response.json()).to.be.an("array");
      });

      pm.test("Each book has required fields", function () {
          pm.response.json().forEach(function (book) {
              pm.expect(book).to.have.all.keys("id", "title", "author", "genre", "yearPublished", "checkedOut", "isPermanentCollection", "createdAt");
          });
      });

      pm.test("Response includes 'To Kill a Mockingbird'", function () {
          const books = pm.response.json();
          const found = books.some(function (book) {
              return book.title.toLowerCase() === "to kill a mockingbird";
          });
          pm.expect(found, "Expected 'To Kill a Mockingbird' to be in the list of books").to.be.true;
      });
    language: text/javascript
examples: .resources/Fetch a list of books.resources/examples
order: 1000

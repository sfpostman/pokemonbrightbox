  - key: limit
    value: ""
    disabled: true
    description: The maximum number of rows to return in the response.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": "20",
            "minimum": "1",
            "maximum": "100"
          }
        }
      }
  - key: cursor
    value: ""

$kind: http-request
description: Removes workspace-environment associations from a system environment.
url: "{{baseUrl}}/api-catalog/system-environments/:systemEnvironmentId/associations"
method: DELETE
pathVariables:
  - key: systemEnvironmentId
    value: ""
    description: The system environment's ID.
body:
  type: json
  content: |-
    {
        "workspaceEnvironmentIds": [
            "{{workspaceEnvironmentId}}"
        ]
    }
examples: ./.resources/Remove system environment associations.resources/examples
order: 7000

$kind: http-request
description: |-
  Updates a system environment's information. You can update one or more fields in a single call.

  **Note:**

  If you update the name, it must be unique within the team.
url: "{{baseUrl}}/api-catalog/system-environments/:systemEnvironmentId"
method: PATCH
pathVariables:
  - key: systemEnvironmentId
    value: ""
    description: The system environment's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "name": "{{systemEnvironmentName}}",
        "description": "{{systemEnvironmentDescription}}",
        "color": "{{systemEnvironmentColor}}",
        "isProduction": {{isSystemEnvironmentProduction}}
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "name": {
                "type": "string",
                "minLength": 1,
                "maxLength": 255,
                "description": "The system environment's name. This value must be unique within the team."
            },
            "description": {
                "type": "string",
                "maxLength": 500,
                "description": "A description of the system environment. To remove a description, pass this value as an empty string."
            },
            "color": {
                "type": "string",
                "description": "A six-digit hex color code.",
                "pattern": "^#[0-9A-Fa-f]{6}$"
            },
            "isProduction": {
                "type": "boolean",
                "description": "If true, the system environment is a production environment."
            }
        },
        "minProperties": 1,
        "additionalProperties": false
    }
examples: ./.resources/Update a system environment.resources/examples
order: 4000

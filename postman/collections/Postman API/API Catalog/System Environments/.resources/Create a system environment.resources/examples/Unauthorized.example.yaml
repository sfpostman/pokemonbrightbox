$kind: http-example
request:
  url: https://api.getpostman.com/api-catalog/system-environments
  method: POST
  body:
    type: json
    content: |-
      {
          "name": "ALPHA",
          "label": "alpha",
          "description": "This is the ALPHA environment",
          "color": "#00FF00",
          "isProduction": false
      }
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/unauthorized",
          "status": 401,
          "title": "Unauthorized",
          "detail": "Authentication required."
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              }
          }
      }
order: 5000

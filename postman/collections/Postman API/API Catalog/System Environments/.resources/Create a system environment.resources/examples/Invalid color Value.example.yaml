$kind: http-example
request:
  url: https://api.getpostman.com/api-catalog/system-environments
  method: POST
  body:
    type: json
    content: |-
      {
          "name": "ALPHA",
          "label": "alpha",
          "description": "This is the ALPHA environment",
          "color": "blue",
          "isProduction": false
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": "Validation Error: color: Must be a valid hex color (e.g., #FF5733)",
          "errors": [
              {
                  "path": "color",
                  "message": "Must be a valid hex color (e.g., #FF5733)"
              }
          ]
      }
order: 4000

$kind: http-example
request:
  url: https://api.getpostman.com/api-catalog/system-environments
  method: POST
  body:
    type: json
    content: |-
      {
          "name": "",
          "label": "alpha",
          "description": "This is the ALPHA environment",
          "color": "#00FF00",
          "isProduction": false
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": "Validation Error: name: Name is required",
          "errors": [
              {
                  "path": "name",
                  "message": "Name is required"
              }
          ]
      }
order: 3000

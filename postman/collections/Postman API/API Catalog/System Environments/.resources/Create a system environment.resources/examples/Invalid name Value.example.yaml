    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": "Validation Error: name: Name is required",
          "errors": [
              {
                  "path": "name",
                  "message": "Name is required"
              }
          ]
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",

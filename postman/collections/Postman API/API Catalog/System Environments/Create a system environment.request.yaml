$kind: http-request
description: Creates a system environment for the authenticated team.
url: "{{baseUrl}}/api-catalog/system-environments"
method: POST
body:
  type: json
  content: |-
    {
        "name": "{{systemEnvironmentName}}",
        "label": "{{systemEnvironmentLabel}}",
        "description": "{{systemEnvironmentDescription}}",
        "color": "{{systemEnvironmentColor}}",
        "isProduction": {{isSystemEnvironmentProduction}}
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "name": {
                "type": "string",
                "minLength": 1,
                "maxLength": 255,
                "description": "The system environment's name. This value must be unique within the team."
            },
            "label": {
                "type": "string",
                "maxLength": 50,
                "pattern": "^[a-z0-9_-]+$",
                "description": "A lowercase, terminal-friendly identifier for the system environment. Accepts only alphanumeric characters, hyphens, and underscores."
            },
            "description": {
                "type": "string",
                "maxLength": 500,
                "description": "A description of the system environment. To remove a description, pass this value as an empty string."
            },
            "color": {
                "type": "string",
                "pattern": "^#[0-9A-Fa-f]{6}$",
                "description": "A six-digit hex color code."
            },
            "isProduction": {
                "type": "boolean",
                "default": false,
                "description": "If true, the system environment is a production environment."
            }
        },
        "required": [
            "name",
            "color"
        ],
        "additionalProperties": false
    }
examples: ./.resources/Create a system environment.resources/examples
order: 3000

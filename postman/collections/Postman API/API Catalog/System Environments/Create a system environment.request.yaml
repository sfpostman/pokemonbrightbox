$kind: http-request
description: Creates a system environment for the authenticated team.
url: "{{baseUrl}}/api-catalog/system-environments"
method: POST
body:
  type: json
  content: |-
    {
        "name": "{{systemEnvironmentName}}",
        "label": "{{systemEnvironmentLabel}}",
        "description": "{{systemEnvironmentDescription}}",
        "color": "{{systemEnvironmentColor}}",
        "isProduction": {{isSystemEnvironmentProduction}}
    }
examples: ./.resources/Create a system environment.resources/examples
order: 3000

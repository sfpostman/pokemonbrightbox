$kind: http-request
description: Get a list of observed API endpoints for a service and its performance metrics.
url: "{{baseUrl}}/api-catalog/services/:serviceId/endpoints?systemEnvironmentId="
method: GET
queryParams:
  - key: systemEnvironmentId
    value: ""
    description: The system environment's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
  - key: httpMethods
    value: ""
    disabled: true
    description: A.comma-separated list of HTTP methods to filter the results by.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "pattern": "^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|TRACE)(,(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|TRACE))*$"
          }
        }
      }
  - key: hosts
    value: ""
    disabled: true
    description: A comma-separated list of hostnames to filter the results by.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "pattern": "^[^,]+(,[^,]+)*$"
          }
        }
      }
  - key: responseCodes
    value: ""
    disabled: true
    description: A comma-separated list of HTTP status codes to filter the results by.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "pattern": "^\\\\d{3}(,\\\\d{3})*$"
          }
        }
      }
  - key: search
    value: ""
    disabled: true
    description: Filter results to the search filter given on the endpoint's path.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "maxLength": "500"
          }
        }
      }
  - key: sort
    value: ""
    disabled: true
    description: Sort the results in field:direction order format. Accepts the `count`, `endpoint`, `p95LatencyMs`, and `errorRate` fields. Supports the `asc` and `desc` directions.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "pattern": "^(count|endpoint|p95LatencyMs|errorRate):(asc|desc)$"
          }
        }
      }
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of rows to return in the response.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": "20",
            "minimum": "1",
            "maximum": "100"
          }
        }
      }
  - key: cursor
    value: ""
    disabled: true
    description: The pointer to the first record of the set of paginated results. To view the next response, use the `nextCursor` value for this parameter.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "pattern": "^[A-Za-z0-9+/=]+$"
          }
        }
      }
pathVariables:
  - key: serviceId
    value: ""
    description: The service's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Get a service's endpoints.resources/examples
order: 3000

$kind: http-example
request:
  url: https://api.getpostman.com/api-catalog/services/:serviceId
  method: GET
  pathVariables:
    serviceId: a5450abd-ec89-443c-a17a-68132e738714
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    content-type: application/problem+json
  body:
    type: json
    content: |-
      {
        "type": "https://api.postman.com/problems/forbidden",
        "status": 403,
        "title": "Forbidden",
        "detail": "This feature requires a Postman Enterprise plan. Visit https://www.postman.com/pricing/ to upgrade."
      }
    $type: |-
      {
          "type": "object",
          "required": ["type", "status", "title", "detail"],
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              }
          }
      }
order: 4000

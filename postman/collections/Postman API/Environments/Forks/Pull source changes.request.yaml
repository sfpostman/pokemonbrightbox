$kind: http-request
description: "[Pulls](https://learning.postman.com/docs/collaborating-in-postman/using-version-control/forking-elements/#pull-updates-from-a-parent-element) the changes from a parent (source) environment into the forked environment."
url: "{{baseUrl}}/environments/:environmentUid/pulls"
method: POST
pathVariables:
  - key: environmentUid
    value: ""
    description: The destination environment's unique ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "source": "{{environmentUid}}"
    }
  $type: |-
    {
        "type": "object",
        "required": ["source"],
        "properties": {
            "source": {
                "type": "string",
                "description": "The source environment's unique ID to pull data from."
            }
        }
    }
examples: ./.resources/Pull source changes.resources/examples
order: 3000

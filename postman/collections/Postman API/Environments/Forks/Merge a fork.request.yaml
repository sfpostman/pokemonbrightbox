$kind: http-request
description: "[Merges](https://learning.postman.com/docs/collaborating-in-postman/using-version-control/forking-elements/#merge-changes-from-a-fork) a forked environment back into its parent environment."
url: "{{baseUrl}}/environments/:environmentUid/merges"
method: POST
pathVariables:
  - key: environmentUid
    value: ""
    description: The environment's unique ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "source": "{{environmentUid}}",
        "deleteSource": false
    }
  $type: |-
    {
        "type": "object",
        "required": ["source"],
        "properties": {
            "source": {
                "type": "string",
                "description": "The source environment's unique ID to merge data from."
            },
            "deleteSource": {
                "type": "boolean",
                "default": false,
                "description": "If true, the forked environment will be deleted."
            }
        }
    }
examples: ./.resources/Merge a fork.resources/examples
order: 4000

$kind: http-example
request:
  url: https://api.getpostman.com/environments/:environmentId
  method: PUT
  pathVariables:
    environmentId: 12345678-5daabc50-8451-43f6-922d-96b403b4f28e
  body:
    type: json
    content: |-
      {
          "environment": {
              "name": "Test A Environment",
              "values": [
                  {
                      "key": "collectionId",
                      "value": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
                      "type": "default",
                      "enabled": true,
                      "description": "The collection's ID."
                  }
              ]
          }
      }
response:
  statusCode: 413
  statusText: Payload Too Large
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/payload-too-large",
          "title": "Payload Too Large",
          "detail": "Request size limit exceeded",
          "status": 413,
          "instance": "/"
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              },
              "instance": {
                  "type": "string",
                  "description": "The URI reference that identifies the specific occurrence of the problem."
              }
          }
      }
order: 5000

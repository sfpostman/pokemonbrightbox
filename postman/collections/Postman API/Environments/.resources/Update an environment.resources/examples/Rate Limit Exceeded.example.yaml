$kind: http-example
request:
  url: https://api.getpostman.com/environments/:environmentId
  method: PATCH
  pathVariables:
    environmentId: 5daabc50-8451-43f6-922d-96b403b4f28e
  body:
    type: json
    content: |-
      {
          "environment": {
              "name": "Test A Environment",
              "values": [
                  null,

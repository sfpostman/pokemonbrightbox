$kind: http-example
request:
  url: https://api.getpostman.com/environments
  method: POST
  body:
    type: json
    content: |-
      {
          "environment": {
              "values": [
                  {
                      "key": "collectionId",
                      "value": "12ece9e1-2abf-4edc-8e34-de66e74114d2",
                      "enabled": true,
                      "type": "default"
                  },
                  {
                      "key": "variable_1",
                      "value": "The variable_1 value.",
                      "enabled": false,
                      "type": "default"
                  }
              ]
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "malformedRequestError",
              "message": "Found 1 errors with the supplied environment.",
              "details": [
                  "environment: must have required property 'name'"
              ]
          }
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "error": {
                  "type": "object",
                  "properties": {
                      "name": {
                          "type": "string",
                          "description": "The error name."

                      },
                      "message": {
                          "type": "string",
                          "description": "The error message."
                      },
                      "details": {
                          "type": "array",
                          "description": "Information about the error.",
                          "items": {
                              "type": "string"
                          }
                      }
                  }
              }
          }
      }
order: 2000

$kind: http-request
description: |-
  Creates an environment.

  **Note:**

  - The request body size cannot exceed the maximum allowed size of 30MB.
      
  - If you receive an HTTP `411 Length Required` error response, manually pass the `Content-Length` header and its value in the request header.
      
  - If you do not include the `workspace` query parameter, the system creates the environment in the oldest personal Internal workspace you own.
url: "{{baseUrl}}/environments?workspace="
method: POST
queryParams:
  - key: workspace
    value: ""
    description: |-
      A workspace ID in which to create the environment.

      If you do not include this query parameter, the system creates the environment in the oldest personal Internal workspace you own.
body:
  type: json
  content: |-
    {
        "environment": {
            "name": "{{environmentName}}",
            "values": [
                {
                    "key": "{{environmentVariableName}}",
                    "value": "{{environmentVariableValue}}",
                    "enabled": true,
                    "type": "{{environmentVariableType}}",
                    "description": "{{environmentVariableDescription}}"
                }
            ]
        }
    }
examples: ./.resources/Create an environment.resources/examples
order: 4000

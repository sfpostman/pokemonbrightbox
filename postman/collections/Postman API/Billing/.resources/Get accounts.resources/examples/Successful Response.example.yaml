$kind: http-example
request:
  url: https://api.getpostman.com/accounts
  method: GET
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "id": 12345678,
          "teamId": 1234,
          "state": "PAID",
          "slots": {
              "total": 10,
              "unbilled": 0,
              "consumed": 2,
              "available": 8
          },
          "salesChannel": "SELF_SERVE",
          "billingEmail": "taylor.lee@example.com"
      }
    $type: |-
      {
          "type": "object",
          "description": "Information about the account.",
          "properties": {
              "id": {
                  "type": "integer",
                  "description": "The account's ID."
              },
              "teamId": {
                  "type": "integer",
                  "description": "The team's ID associated with the account."
              },
              "state": {
                  "type": "string",
                  "description": "The account's current state:\n- `FREE`\n- `PAID`\n- `EXPIRED_TRIAL`\n- `OVERDUE`\n- `SUSPENDED`\n- `BLOCKED`\n- `PAYMENT_DISPUTED`"
              },
              "slots": {
                  "type": "object",
                  "description": "Information about the team's slots.",
                  "properties": {
                      "total": {
                          "type": "integer",
                          "description": "The total number of slots available to the team."
                      },
                      "unbilled": {
                          "type": "integer",
                          "description": "The number of unbilled slots if [auto-flex billing](https://learning.postman.com/auto-flex-policy/) is available."
                      },
                      "consumed": {
                          "type": "integer",
                          "description": "The number of currently-billed team members."
                      },
                      "available": {
                          "type": "integer",
                          "description": "The number of the team's available slots."
                      }
                  }
              },
              "salesChannel": {
                  "type": "string",
                  "description": "The sales channel from which the account was created:\n- `SELF_SERVE` — The user purchased the account plan.\n- `SALES_SERVE` — The account was purchased through the Postman sales team process."
              },
              "billingEmail": {
                  "type": "string",
                  "format": "email",
                  "description": "The email address to which invoices are sent."
              }
          }
      }
order: 1000

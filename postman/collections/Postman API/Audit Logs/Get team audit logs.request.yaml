$kind: http-request
description: Gets a list of your team's generated audit events. For a complete list of all audit events, see [Audit logs](https://learning.postman.com/docs/administration/audit-logs/).
url: "{{baseUrl}}/audit/logs"
method: GET
queryParams:
  - key: userId
    value: ""
    disabled: true
    description: Return only results that match the given user ID.
  - key: action
    value: ""
    disabled: true
    description: Filter results by an audit log action.
  - key: since
    value: ""
    disabled: true
    description: Return logs created after the given time, in YYYY-MM-DD format.
  - key: until
    value: ""
    disabled: true
    description: Return logs created before the given time, in YYYY-MM-DD format.
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of audit events to return at once. The maximum value is 300.
  - key: cursor
    value: ""
    disabled: true
    description: The cursor to get the next set of results.
  - key: orderBy
    value: ""
    disabled: true
    description: Return the records in ascending (`asc`) or descending (`desc`) order. This value defaults to `desc` order.
  - key: order_by
    value: ""
    disabled: true
    description: Return the records in ascending (`asc`) or descending (`desc`) order. This value defaults to `desc` order.
scripts:
  - type: afterResponse
    code: |
      // Aggregate last login per user across paginated audit log responses
      const MAX_PAGES = 10;

      let aggregate = pm.collectionVariables.get('auditAggregate');
      aggregate = aggregate ? JSON.parse(aggregate) : { byUser: {}, pagesFetched: 0 };

      const res = pm.response.json();
      const logs = res.trails || res.data || [];

      logs.forEach(entry => {
          const action = entry.action || (entry.data && entry.data.action) || '';
          if (!String(action).toLowerCase().includes('login')) return;

          const data = entry.data || {};
          const user = entry.user || data.user || {};
          const actor = data.actor || {};
          const userId = user.id || user.userId || actor.id || entry.userId || actor.username || 'unknown';
          const username = user.username || user.name || actor.username || actor.name || user.email || actor.email || `user-${userId}`;
          const email = user.email || actor.email || '';
          const ts = entry.timestamp || entry.createdAt || entry.created_at || entry.time;
          const tsMs = ts ? new Date(ts).getTime() : 0;

          const existing = aggregate.byUser[userId];
          if (!existing || tsMs > existing.tsMs) {
              aggregate.byUser[userId] = { userId, username, email, lastLogin: ts, tsMs };
          }
      });

      aggregate.pagesFetched += 1;

      const next = res.next || res.cursor || (res.meta && res.meta.nextCursor);
      const shouldContinue = next && aggregate.pagesFetched < MAX_PAGES;

      pm.collectionVariables.set('auditAggregate', JSON.stringify(aggregate));

      if (shouldContinue) {
          pm.collectionVariables.set('auditCursor', next);
          postman.setNextRequest(pm.info.requestName);
          return;
      }

      // Done — render visualization
      const rows = Object.values(aggregate.byUser).sort((a, b) => b.tsMs - a.tsMs);

      const template = `
      <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 12px; }
        h2 { margin: 0 0 12px 0; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px 10px; text-align: left; }
        th { background: #f7f7f7; position: sticky; top: 0; }
        tr:hover { background: #fafafa; }
        .muted { color: #888; margin-bottom: 8px; }
      </style>
      <h2>Last Login per User</h2>
      <div class="muted">Total users: {{count}} • Pages scanned: {{pages}}</div>
      <table>
        <thead><tr><th>User</th><th>Email</th><th>Last Login (UTC)</th></tr></thead>
        <tbody>
          {{#each rows}}
            <tr><td>{{username}}</td><td>{{email}}</td><td>{{lastLogin}}</td></tr>
          {{/each}}
        </tbody>
      </table>
      `;

      pm.visualizer.set(template, { rows, count: rows.length, pages: aggregate.pagesFetched });

      // Reset for next manual run
      pm.collectionVariables.unset('auditAggregate');
      pm.collectionVariables.unset('auditCursor');
    language: text/javascript
  - type: beforeRequest
    code: |
      // Append cursor to URL if one is stored from a previous page
      const cursor = pm.collectionVariables.get('auditCursor');
      if (cursor) {
          pm.request.url.query.upsert({ key: 'cursor', value: cursor });
      } else {
          pm.request.url.query.remove('cursor');
      }
    language: text/javascript
examples: ./.resources/Get team audit logs.resources/examples
order: 1000

    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "title": "Invalid request body.",
          "detail": "Invalid \"action\" property - should be one of: invite_partner, remove_partner",
          "status": 400
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "detail": {
                  "type": "string",
                  "description": "Information about the error."

$kind: http-request
description: Gets a workspace's global [variables](https://learning.postman.com/docs/sending-requests/variables/#variable-scopes). Global variables enable you to access data between collections, requests, scripts, and environments and are available throughout a workspace.
url: "{{baseUrl}}/workspaces/:workspaceId/global-variables"
method: GET
pathVariables:
  - key: workspaceId
    value: ""
    description: The workspace's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Get global variables.resources/examples
order: 1000

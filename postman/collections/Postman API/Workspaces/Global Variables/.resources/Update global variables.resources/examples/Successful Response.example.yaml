$kind: http-example
request:
  url: https://api.getpostman.com/workspaces/1f0df51a-8658-4ee8-a2a1-d2567dfa09a9/global-variables
  method: PUT
  body:
    type: json
    content: |-
      {
        "values": [
          {
            "key": "x-api-key",
            "value": "{{postman-api-key}}",
            "type": "secret",
            "enabled": true,
            "description": "A valid Postman API key."
          },
          {
            "key": "collectionId",
            "value": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
            "type": "default",
            "enabled": true,
            "description": "The collection's ID."
          }
        ]
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "values": [
              {
                  "value": "{{postman-api-key}}",
                  "key": "x-api-key",
                  "enabled": true,
                  "type": "secret",
                  "description": "A valid Postman API key."
              },
              {
                  "value": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
                  "key": "collectionId",
                  "enabled": true,
                  "type": "default",
                  "description": "The collection's ID."
              }
          ]
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "values": {
                  "type": "array",
                  "description": "A list of the workspace's global variables.",
                  "items": {
                      "type": "object",
                      "description": "Information about the global variable.",
                      "properties": {
                          "value": {
                              "type": "string",
                              "description": "The variable's value."
                          },
                          "key": {
                              "type": "string",
                              "description": "The variable's name."
                          },
                          "enabled": {
                              "type": "boolean",
                              "description": "If true, the variable is enabled."
                          },
                          "type": {
                              "type": "string",
                              "description": "The [type](https://learning.postman.com/docs/sending-requests/variables/#variable-types) of variable.",
                              "enum": ["default", "secret"]
                          },
                          "description": {
                              "type": "string",
                              "maxLength": 512,
                              "description": "The variable's description."
                          }
                      }
                  }
              }
          }
      }
order: 1000

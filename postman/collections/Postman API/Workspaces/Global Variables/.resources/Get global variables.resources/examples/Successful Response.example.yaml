$kind: http-example
request:
  url: https://api.getpostman.com/workspaces/:workspaceId/global-variables
  method: GET
  pathVariables:
    workspaceId: 1f0df51a-8658-4ee8-a2a1-d2567dfa09a9
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "values": [
              {
                  "value": "{{postman-api-key}}",
                  "key": "x-api-key",
                  "enabled": true,
                  "type": "secret",
                  "description": "A valid Postman API key."
              },
              {
                  "value": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
                  "key": "collectionId",
                  "enabled": true,
                  "type": "default",
                  "description": "The collection's ID."
              }
          ]
      }
order: 1000

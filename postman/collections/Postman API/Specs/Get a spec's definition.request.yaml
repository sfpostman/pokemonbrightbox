$kind: http-request
description: Gets the complete contents of an API specification's definition.
url: "{{baseUrl}}/specs/:specId/definitions"
method: GET
pathVariables:
  - key: specId
    value: ""
    description: The spec's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Get a spec's definition.resources/examples
order: 8000

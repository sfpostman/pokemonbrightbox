$kind: http-request
description: Generates an API specification for the given collection. The response contains a polling link to the task status.
url: "{{baseUrl}}/collections/:collectionUid/generations/:elementType"
method: POST
pathVariables:
  - key: collectionUid
    value: ""
    description: The collection's unique ID.
  - key: elementType
    value: spec
    description: The `spec` value.
body:
  type: json
  content: |-
    {
        "name": "{{specName}}",
        "type": "{{specType}}",
        "format": "{{formatType}}"
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "name": {
                "type": "string",
                "description": "The API specification's name."
            },
            "type": {
                "type": "string",
                "enum": ["OPENAPI:2.0", "OPENAPI:3.0"],
                "description": "The specification's type."
            },
            "format": {
                "type": "string",
                "enum": ["JSON", "YAML"],
                "description": "The format of the API specification."
            }
        }
    }
examples: ./.resources/Generate spec from collection.resources/examples
order: 1000

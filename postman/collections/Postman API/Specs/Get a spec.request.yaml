$kind: http-request
description: Gets information about an API specification.
url: "{{baseUrl}}/specs/:specId"
method: GET
pathVariables:
  - key: specId
    value: ""
    description: The spec's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Get a spec.resources/examples
order: 6000

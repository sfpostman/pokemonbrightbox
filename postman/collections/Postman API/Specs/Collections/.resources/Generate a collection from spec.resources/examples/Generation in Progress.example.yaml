$kind: http-example
request:
  url: https://api.getpostman.com/specs/:specId/generations/:elementType
  method: POST
  pathVariables:
    specId: 73e15000-bc7a-4802-b80e-05fff18fd7f8
    elementType: collection
  body:
    type: json
    content: |-
      {
          "name": "Sample API",
          "options": {
              "enableOptionalParameters": true,
              "folderStrategy": "Tags"
          }
      }
response:
  statusCode: 423
  statusText: Locked
  body:
    type: json
    content: |-
      {
          "type": "actionLockedError",
          "title": "Collection generation in progress",
          "status": 423,
          "detail": "Collection generation is already in progress for the spec."
      }
order: 4000

$kind: http-request
description: Gets all of an API specification's generated collections.
url: "{{baseUrl}}/specs/:specId/generations/:elementType"
method: GET
queryParams:
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of rows to return in the response. This value defaults to `10`.
  - key: cursor
    value: ""
    disabled: true
    description: The pointer to the first record of the set of paginated results. To view the next response, use the `nextCursor` value for this parameter.
pathVariables:
  - key: specId
    value: ""
    description: The spec's ID.
  - key: elementType
    value: collection
    description: The `collection` element type.
examples: ./.resources/Get a spec's generated collections.resources/examples
order: 2000

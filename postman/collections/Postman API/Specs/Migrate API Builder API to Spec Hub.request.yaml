$kind: http-request
description: |-
  Migrates an API Builder definition to a [Spec Hub](https://learning.postman.com/docs/design-apis/specifications/overview) specification. You can migrate the definition to an existing workspace, or create a new workspace to migrate the definition into. On success, this returns an HTTP `202 Created` response. You can use the GET `/apis/{apiId}/spec-migrations` endpoint to check the migration status.

  **Note:**

  This returns an HTTP `200 OK` response if the given API ID isn't an API Builder definition.
url: "{{baseUrl}}/apis/:apiId/spec-migrations"
method: POST
headers:
  Accept: application/vnd.api.v10+json
pathVariables:
  - key: apiId
    value: ""
    description: The API's ID.
body:
  type: json
  content: |-
    {
        "workspaceId": "{{workspaceId}}"
    }

    // Use the following request body to migrate an API Builder definition into a new workspace:
    // {
    //    "workspaceInfo": {
    //        "name": "{{workspaceName}}"
    //   }
    //}

    // Use the following request body to migrate a Git-connected API Builder definition into a new workspace:
    //{
    //    "workspaceInfo": {
    //        "name": "{{workspaceName}}"
    //    },
    //    "gitInfo": {
    //        "path": "{{gitPath}}"
    //    }
    //}
  $type: |-
    {
        "anyOf": [
            {
                "title": "Migrate to Existing Workspace",
                "type": "object",
                "required": [
                    "workspaceId"
                ],
                "properties": {
                    "workspaceId": {
                        "type": "string",
                        "description": "The ID of an existing workspace to migrate the definition to."
                    }
                }
            },
            {
                "title": "Migrate Git-Connected API to New Workspace",
                "required": [
                    "workspaceInfo"
                ],
                "properties": {
                    "workspaceInfo": {
                        "type": "object",
                        "required": [
                            "name"
                        ],
                        "description": "Information about the new workspace.",
                        "properties": {
                            "name": {
                                "type": "string",
                                "description": "The name of the workspace to create and migrate the definition to."
                            }
                        }
                    },
                    "gitInfo": {
                        "type": "object",
                        "description": "Information about the connected remote Git repository.",
                        "required": ["path"],
                        "properties": {
                            "path": {
                                "type": "string",
                                "description": "The directory path in the remote repository containing the API's collections and definitions. This property expects an absolute path and only contains alphanumeric characters, slashes, hyphens, underscores, and periods. It cannot contain  path traversal sequences (\\..\\)."
                            }
                        }
                    }
                }
            }
        ]
    }
examples: ./.resources/Migrate API Builder API to Spec Hub.resources/examples
order: 13000

$kind: http-request
description: Publishes a workspace in your team's [Private API Network](https://learning.postman.com/docs/collaborating-in-postman/adding-private-network/).
url: "{{baseUrl}}/network/private"
method: POST
body:
  type: json
  content: |-
    {
        "workspace": {
            "id": "{{workspaceId}}"
        }
    }
examples: ./.resources/Add a workspace.resources/examples
order: 3000

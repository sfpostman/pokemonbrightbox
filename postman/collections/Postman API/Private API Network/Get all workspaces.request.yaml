$kind: http-request
description: Gets information workspaces added to your team's [Private API Network](https://learning.postman.com/docs/collaborating-in-postman/adding-private-network/).
url: "{{baseUrl}}/network/private"
method: GET
queryParams:
  - key: type
    value: workspace
    disabled: true
    description: The `workspace` value.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "enum": [
              "api",
              "folder",
              "collection",
              "workspace"
            ],
            "uniqueItems": false
          }
        }
      }
  - key: name
    value: ""
    disabled: true
    description: Return only workspaces whose name includes the given value. Matching is not case-sensitive.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: summary
    value: ""
    disabled: true
    description: Return only workspaces whose summary includes the given value. Matching is not case-sensitive.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: description
    value: ""
    disabled: true
    description: Return only workspaces whose description includes the given value. Matching is not case-sensitive.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: since
    value: ""
    disabled: true
    description: Return only results created since the given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be later than the `until` value.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "format": "date-time",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: until
    value: ""
    disabled: true
    description: Return only results created until this given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be earlier than the `since` value.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "format": "date-time",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: addedBy
    value: ""
    disabled: true
    description: Return only workspaces published by the given user ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: sort
    value: ""
    disabled: true
    description: |-
      Sort the results by the given value. One of:
      - `createdAt`
      - `updatedAt`

      If you use this query parameter, you must also use the `direction` parameter.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "enum": [
              "createdAt",
              "updatedAt"
            ],
            "uniqueItems": false
          }
        }
      }
  - key: direction
    value: ""
    disabled: true
    description: Sort in ascending (`asc`) or descending (`desc`) order. Matching is not case-sensitive. If you use this query parameter, you must also use the `sort` parameter.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "enum": [
              "asc",
              "desc"
            ],
            "uniqueItems": false
          }
        }
      }
  - key: createdBy
    value: ""
    disabled: true
    description: Return only the elements created by the given user ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: offset
    value: ""
    disabled: true
    description: The zero-based offset of the first item to return. This value defaults to `0`.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false,
            "default": "0",
            "uniqueItems": false
          }
        }
      }
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of results to return. If the value exceeds the maximum value of `1000`, then the system uses the `1000` value.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false,
            "default": "1000",
            "uniqueItems": false
          }
        }
      }
  - key: parentFolderId
    value: ""
    disabled: true
    description: This parameter is deprecated.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": true,
            "uniqueItems": false
          }
        }
      }
examples: ./.resources/Get all workspaces.resources/examples
order: 2000

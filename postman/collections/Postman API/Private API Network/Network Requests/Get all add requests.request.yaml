$kind: http-request
description: Gets all requests to add workspaces to your team's [Private API Network](https://learning.postman.com/docs/collaborating-in-postman/adding-private-network/).
url: "{{baseUrl}}/network/private/network-entity/request/all"
method: GET
queryParams:
  - key: since
    value: ""
    disabled: true
    description: |-
      Return only results created since the given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be later than the `until` value.

      To use time-numoffset format, you must use `%2B` URL-encoding for the `+` character.
  - key: until
    value: ""
    disabled: true
    description: |-
      Return only results created until this given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be earlier than the `since` value.

      To use time-numoffset format, you must use `%2B` URL-encoding for the `+` character.
  - key: requestedBy
    value: ""
    disabled: true
    description: Return a user's requests by their user ID.
  - key: type
    value: workspace
    disabled: true
    description: The `workspace` value.
  - key: status
    value: ""
    disabled: true
    description: "Filter by the request status. One of: `pending`, `denied`."
  - key: name
    value: ""
    disabled: true
    description: Return only workspaces whose name includes the given value. Matching is not case-sensitive.
  - key: sort
    value: ""
    disabled: true
    description: Sort the results by the `createdAt` or `updatedAt` properties. If you use this query parameter, you must also use the `direction` parameter.
  - key: direction
    value: ""
    disabled: true
    description: Sort in ascending (`asc`) or descending (`desc`) order. Matching is not case-sensitive. If you use this query parameter, you must also use the `sort` parameter.
  - key: offset
    value: ""
    disabled: true
    description: The zero-based offset of the first item to return. This value defaults to `0`.
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of elements to return. If the value exceeds the maximum value of `1000`, then the system uses the `1000` value.
examples: ./.resources/Get all add requests.resources/examples
order: 2000

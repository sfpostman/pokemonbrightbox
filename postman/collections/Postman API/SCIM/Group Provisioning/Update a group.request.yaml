$kind: http-request
description: |-
  Updates a group's information. Using this endpoint you can:

  - Update a group's name.
      
  - Add or remove members from a Postman group.
url: "{{baseUrl}}/scim/v2/Groups/:groupId"
method: PATCH
pathVariables:
  - key: groupId
    value: ""
    description: The group's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "schemas": [
            "urn:ietf:params:scim:api:messages:2.0:PutOp"
        ],
        "Operations": [
            {
                "op": "{{operation}}",
                "value": {
                    "id": "{{groupId}}",
                    "displayName": "{{userGroupName}}"
                }
            }
        ]
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "schemas": {
                "type": "array",
                "description": "The [SCIM schema URI](https://www.iana.org/assignments/scim/scim.xhtml).",
                "items": {
                    "type": "string",
                    "format": "uri",
                    "enum": ["urn:ietf:params:scim:api:messages:2.0:PutOp"]
                }
            },
            "Operations": {
                "type": "array",
                "description": "Information about the group update operation.",
                "items": {
                    "type": "object",
                    "properties": {
                        "op": {
                            "type": "string",
                            "description": "The operation to perform.",
                            "enum": ["replace", "add", "remove"]
                        },
                        "value": {
                            "type": "object",
                            "description": "The performed operation's value.",
                            "properties": {
                                "id": {
                                    "type": "string",
                                    "description": "The group's ID."
                                },
                                "displayName": {
                                    "type": "string",
                                    "description": "The group's name."
                                }
                            }
                        }
                    }
                }
            }
        }
    }
examples: ./.resources/Update a group.resources/examples
order: 2000

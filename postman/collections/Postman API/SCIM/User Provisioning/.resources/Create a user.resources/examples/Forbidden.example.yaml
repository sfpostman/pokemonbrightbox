$kind: http-example
request:
  url: https://api.getpostman.com/scim/v2/Users
  method: POST
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:schemas:core:2.0:User"
          ],
          "userName": "taylor-lee@example.com",
          "name": {
              "givenName": "Taylor",
              "familyName": "Lee"
          },
          "externalId": "12345678",
          "displayName": "Taylor Lee",
          "locale": "en-US",
          "active": true
      }
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:api:messages:2.0:Error"
          ],
          "detail": "Your API key was generated by a Team Admin who is no longer on your team. Use an API key generated by a Team Admin.",
          "status": "403"
      }
order: 8000

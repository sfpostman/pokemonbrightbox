$kind: http-example
request:
  url: https://api.getpostman.com/scim/v2/Users
  method: POST
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:schemas:core:2.0:User"
          ],
          "userName": "taylor-lee@example.com",
          "name": {
              "givenName": "Taylor",
              "familyName": "Lee"
          },
          "externalId": "12345678",
          "displayName": "Taylor Lee",
          "locale": "en-US",
          "active": true
      }
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:api:messages:2.0:Error"
          ],
          "detail": "Unable to access the team. Check if you have entered a valid API key.",
          "status": "401"
      }
order: 7000

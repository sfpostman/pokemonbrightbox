$kind: http-example
request:
  url: https://api.getpostman.com/scim/v2/Users/:userId
  method: PATCH
  pathVariables:
    userId: 405775fe15ed41872a8eea4c8aa2b38cda9749812cc55c99
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:api:messages:2.0:PatchOp"
          ],
          "Operations": [
              {
                  "op": "replace",
                  "value": {
                      "active": false
                  }
              }
          ]
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:api:messages:2.0:Error"
          ],
          "scimType": "invalidSyntax",
          "detail": "You’ve used operation that Postman doesn’t support.",
          "status": "400"
      }
order: 3000

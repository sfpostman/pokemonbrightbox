$kind: http-example
request:
  url: https://api.getpostman.com/scim/v2/Users/:userId
  method: PUT
  pathVariables:
    userId: 405775fe15ed41872a8eea4c8aa2b38cda9749812cc55c99
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:schemas:core:2.0:User"
              ],
          "userName": "taylor-lee@example.com",
          "name": {
              "givenName": "Taylor",
              "familyName": "Lee"
          },
          "externalId": "12345678",
          "locale": "en-US",
          "groups": [],
          "active": true
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "schemas": [
              "urn:ietf:params:scim:api:messages:2.0:Error"
          ],
          "detail": "Couldn’t update this team member’s username. Try again — it should work next time around.",
          "status": "400"
      }
order: 5000

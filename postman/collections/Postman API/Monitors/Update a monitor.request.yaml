$kind: http-request
description: Updates a monitor.
url: "{{baseUrl}}/monitors/:monitorId"
method: PUT
pathVariables:
  - key: monitorId
    value: ""
    description: The monitor's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
    	"monitor": {
    		"name": "{{monitorName}}",
    		"schedule": {
    			"cron": "{{cronFrequencyPattern}}",
                "timezone": "{{monitorTimezone}}"
    		},
            "notificationLimit": 1,
            "active": true,
            "distribution": [
                {
                    "region": "{{regionId}}"
                }
            ],
            "options": {
                "followRedirects": true,
                "requestDelay": 1,
                "requestTimeout": 1,
                "strictSSL": true
            },
            "notifications": {
                "onError": [
                    {
                        "email": "{{emailAddress}}"
                    }
                ],
                "onFailure": [
                    {
                        "email": "{{emailAddress}}"
                    }
                ]
            },
            "retry": {
                "attempts": 1
            }
    	}
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "monitor": {
                "type": "object",
                "properties": {
                    "name": {
                        "type": "string",
                        "description": "The monitor's name."
                    },
                    "schedule": {
                        "type": "object",
                        "description": "Information about the monitor's schedule.",
                        "properties": {
                            "cron": {
                                "type": "string",
                                "description": "The monitor's run frequency, based on the given cron pattern. For example:\n\n| Frequency | Cron pattern |\n| --------- | ------------ |\n| Every 5 minutes | `*/5 * * * *` |\n| Every 30 minutes | `*/30 * * * *` |\n| Every hour | `0 */1 * * *` |\n| Every 6 hours | `0 */6 * * *` |\n| Every day at 5 pm | `0 17 * * *` |\n| Every Monday at 12 pm | `0 12 * * MON` |\n| Every weekday (Mon — Fri) at 6 am | `0 6 * * MON-FRI` |\n"
                            },
                            "timezone": {
                                "type": "string",
                                "description": "The monitor's [timezone](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)."
                            }
                        }
                    },
                    "notificationLimit": {
                        "type": "number",
                        "minimum": 1,
                        "maximum": 99,
                        "description": "Stop email notifications after the given number consecutive failures."
                    },
                    "active": {
                        "type": "boolean",
                        "default": true,
                        "description": "If true, the monitor is active and makes calls to the specified URL."
                    },
                    "distribution": {
                        "type": "array",
                        "description": "A list of the monitor's [geographic regions](https://learning.postman.com/docs/monitoring-your-api/setting-up-monitor/#add-regions).",
                        "items": {
                            "type": "object",
                            "properties": {
                                "region": {
                                    "type": "string",
                                    "description": "The assigned distribution region.",
                                    "enum": ["us-east", "us-west", "ap-southeast", "ca-central", "eu-central", "sa-east", "uk", "us-east-staticip", "us-west-staticip"]
                                }
                            }
                        }
                    },
                    "options": {
                        "type": "object",
                        "description": "Information about the monitor's option settings.",
                        "properties": {
                            "followRedirects": {
                                "type": "boolean",
                                "description": "If true, follow redirects enabled."
                            },
                            "requestDelay": {
                                "type": "number",
                                "minimum": 1,
                                "maximum": 900000,
                                "description": "The monitor's request delay value, in milliseconds."
                            },
                            "requestTimeout": {
                                "type": "number",
                                "minimum": 1,
                                "maximum": 900000,
                                "description": "The monitor's request timeout value, in milliseconds."
                            },
                            "strictSSL": {
                                "type": "boolean",
                                "description": "If true, strict SSL enabled."
                            }
                        }
                    },
                    "notifications": {
                        "type": "object",
                        "description": "Information about the monitor's notification settings.",
                        "properties": {
                            "onError": {
                                "type": "array",
                                "items": {
                                    "type": "object",
                                    "properties": {
                                        "email": {
                                            "type": "string",
                                            "format": "email",
                                            "description": "The email address of the user to notify on monitor error."
                                        }
                                    }
                                }
                            },
                            "onFailure": {
                                "type": "array",
                                "items": {
                                    "type": "object",
                                    "properties": {
                                        "email": {
                                            "type": "string",
                                            "format": "email",
                                            "description": "The email address of the user to notify on monitor failure."
                                        }
                                    }
                                }
                            }
                        }
                    },
                    "retry": {
                        "type": "object",
                        "properties": {
                            "attempts": {
                                "type": "number",
                                "minimum": 1,
                                "maximum": 2,
                                "description": "The number of times to reattempt a monitor run if it fails or errors. This may impact your [monitor usage](https://learning.postman.com/docs/monitoring-your-api/monitor-usage/#view-monitor-usage)."
                            }
                        }
                    }
                }
            }
        }
    }
examples: ./.resources/Update a monitor.resources/examples
order: 7000

$kind: http-example
request:
  url: https://api.getpostman.com/monitors
  method: POST
  body:
    type: json
    content: |-
      {
          "monitor": {
              "name": "Test Monitor",
              "schedule": {
                  "cron": "0 0 * * *",
                  "timezone": "America/Chicago"
              },
              "collection": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
              "environment": "12345678-5daabc50-8451-43f6-922d-96b403b4f28e"
          }
      }
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    X-RateLimit-Limit: "60"
    X-RateLimit-Remaining: "59"
    X-RateLimit-Reset: "1631439621"
    X-RateLimit-RetryAfter: "4"
    RetryAfter: "4"
  body:
    type: json
    content: |-
      {
          "error": "rateLimited",
          "message": "Rate limit exceeded. Please retry after 1669048687"
      }
order: 9000

$kind: http-example
request:
  url: https://api.getpostman.com/monitors
  method: POST
  body:
    type: json
    content: |-
      {
      	"monitor": {
      		"name": "Test Monitor",
      		"schedule": {
      			"cron": "0 0 * * *",
      			"timezone": "America/Chicago"
      		},
      		"collection": "12ece9e1-2abf-4edc-8e34-de66e74114d2",
      		"environment": "12345678-5daabc50-8451-43f6-922d-96b403b4f28e"
      	}
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "invalidUidError",
              "message": "The specified uid is invalid.",
              "details": {
                  "param": "collection",
                  "uid": "12ece9e1-2abf-4edc-8e34-de66e74114d2"
              }
          }
      }
order: 3000

$kind: http-example
request:
  url: https://api.getpostman.com/monitors/:monitorId
  method: PUT
  pathVariables:
    monitorId: 12345678-1e6b6cb7-f13d-4000-acb7-0695757174a8
  body:
    type: json
    content: |-
      {
      	"monitor": {
      		"name": "Test Monitor",
      		"schedule": {
      			"cron": "*/5 * * * *",
      			"timezone": "America/Chicago"
      		}
      	}
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "instanceNotFoundError",
              "message": "The specified monitor does not exist."
          }
      }
order: 5000

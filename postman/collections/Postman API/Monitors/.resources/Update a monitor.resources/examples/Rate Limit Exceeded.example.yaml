$kind: http-example
request:
  url: https://api.getpostman.com/monitors/:monitorId
  method: PUT
  pathVariables:
    monitorId: 12345678-1e6b6cb7-f13d-4000-acb7-0695757174a8
  body:
    type: json
    content: |-
      {
      	"monitor": {
      		"name": "Test Monitor",
      		"schedule": {
      			"cron": "*/5 * * * *",
      			"timezone": "America/Chicago"
      		}
      	}
      }
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    X-RateLimit-Limit: "60"
    X-RateLimit-Remaining: "59"
    X-RateLimit-Reset: "1631439621"
    X-RateLimit-RetryAfter: "4"
    RetryAfter: "4"
  body:
    type: json
    content: |-
      {
          "error": "rateLimited",
          "message": "Rate limit exceeded. Please retry after 1669048687"
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "error": {
                  "type": "string"
              },
              "message": {
                  "type": "string"
              }
          }
      }
order: 7000

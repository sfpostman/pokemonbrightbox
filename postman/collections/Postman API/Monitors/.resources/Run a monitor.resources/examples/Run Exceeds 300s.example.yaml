                      "info": {
                          "type": "object",
                          "description": "Information about the monitor.",
                          "properties": {
                              "monitorId": {
                                  "type": "string",
                                  "description": "The monitor's ID."
                              },
                              "status": {
                                  "type": "string",
                                  "description": "The monitor run's status."
                              },
                              "message": {
                                  "type": "string",
                                  "description": "A message that details the monitor run's current status."
                              }
                          }
                      }
                  }
              }
          }

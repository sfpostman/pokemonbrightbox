  statusCode: 202
  statusText: Accepted
  body:
    type: json
    content: |-
      {
          "run": {
            "info": {
              "monitorId": "1e6b6cc1-c760-48e0-968f-4bfaeeae9af1",
              "status": "running",
              "message": "The request is taking longer than expected, but is processing. To avoid this in future requests, pass the 'async=true' query parameter to use the async option."
              }
          }
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "run": {
                  "type": "object",
                  "description": "The response if the monitor's run exceeds 300 seconds. To get information about the monitor's run, call the GET `/monitors/{id}` endpoint.",

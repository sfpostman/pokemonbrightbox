$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionUid/tags
  method: PUT
  pathVariables:
    collectionUid: 12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2
  body:
    type: json
    content: |-
      {
          "tags": [
              {
                  "slug": "needs-review"
              },
              {
                  "slug": "test-api"
              },
              {
                  "slug": "test-collection"
              },
              {
                  "slug": "preview"
              },
              {
                  "slug": "pre-release"
              },
              {
                  "slug": "api-team"
              }
          ]
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/badrequest",
          "title": "Bad Request",
          "detail": "body/tags must NOT have more than 5 items",
          "status": 400
      }
order: 3000

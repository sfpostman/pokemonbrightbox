$kind: http-request
description: Creates a [fork](https://learning.postman.com/docs/collaborating-in-postman/version-control/#creating-a-fork) from an existing collection into a workspace.
url: "{{baseUrl}}/collections/fork/:collectionId?workspace="
method: POST
queryParams:
  - key: workspace
    value: ""
    description: The workspace ID in which to fork the collection.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
    	"label": "{{collectionForkName}}"
    }
  $type: |-
    {
        "type": "object",
        "required": ["label"],
        "properties": {
            "label": {
                "type": "string",
                "description": "The fork's label."
            }
        }
    }
examples: ./.resources/Create a fork.resources/examples
order: 5000

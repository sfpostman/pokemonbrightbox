$kind: http-request
description: Gets a collection's forked collections. The response returns data for each fork, such as the fork's ID, the user who forked it, and the fork's creation date.
url: "{{baseUrl}}/collections/:collectionId/forks"
method: GET
queryParams:
  - key: cursor
    value: ""
    disabled: true
    description: The pointer to the first record of the set of paginated results.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        }
      }
  - key: direction
    value: ""
    disabled: true
    description: Sort the results by creation date in ascending (`asc`) or descending (`desc`) order.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "enum": [
              "asc",
              "desc"
            ],
            "uniqueItems": false
          }
        }
      }
  - key: limit
    value: "10"
    disabled: true
    description: The maximum number of rows to return in the response. Thsi value defaults to `10`.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false,
            "default": "10",
            "uniqueItems": false
          }
        }
      }
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Get a collection's forks.resources/examples
order: 1000

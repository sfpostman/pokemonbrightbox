$kind: http-example
request:
  url: https://api.getpostman.com/collection-merges
  method: PUT
  body:
    type: json
    content: |-
      {
          "strategy": "default",
          "source": "12345678-5a027c05-056b-49f5-ac9d-37c29f2d91c3",
          "destination": "12345678-b04fa319-3e7e-4fa3-b6a2-f5b29ad67583"
      }
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/forbidden",
          "title": "Forbidden",
          "detail": "You need Editor role on the destination entity and Viewer role on the source entity to merge changes. Additionally, you may also need Editor role on the source entity to update or delete while merging.",
          "status": 403
      }
order: 4000

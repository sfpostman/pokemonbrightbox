  method: GET
  pathVariables:
    collectionId: 12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "detail": "You do not have enough permissions to perform this action.",
          "status": 403,
          "title": "Forbidden",
          "type": "https://api.postman.com/problems/forbidden"
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",

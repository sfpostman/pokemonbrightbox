$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionId
  method: PUT
  headers:
    Prefer: respond-async
  pathVariables:
    collectionId: 12ece9e1-2abf-4edc-8e34-de66e74114d2
  body:
    type: json
    content: |-
      {
          "collection": {
              "info": {
                  "name": "Test User Collection",
                  "description": "This is a basic test user collection.",
                  "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
              },
              "variable": {
                  "key": "userId",
                  "value": "12345678"
              }
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "title": "Malformed request",
          "status": 400,
          "detail": "Unable to parse the collection. Please ensure it is according to https://schema.postman.com/collection/json/v2.1.0/draft-07/docs/index.html"
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              }
          }
      }
order: 2000

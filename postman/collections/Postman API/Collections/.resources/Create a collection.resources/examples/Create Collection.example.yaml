          "properties": {
              "collection": {
                  "type": "object",
                  "properties": {
                      "id": {
                          "type": "string",
                          "description": "The collection's ID."
                      },
                      "name": {
                          "type": "string",
                          "description": "The collection's name."
                      },
                      "uid": {
                          "type": "string",
                          "description": "The collection's unique ID."
                      }
                  }
              }
          }
      }

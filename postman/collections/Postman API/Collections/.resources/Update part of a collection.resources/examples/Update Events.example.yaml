$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionId
  method: PATCH
  pathVariables:
    collectionId: 12ece9e1-2abf-4edc-8e34-de66e74114d2
  body:
    type: json
    content: |-
      {
          "collection": {
              "events": [
                  {
                      "listen": "prerequest",
                      "script": {
                          "id": "e74ce0d0-5acd-44b6-a3ae-95f617c1546e",
                          "type": "text/javascript",
                          "exec": [
                              ""
                          ]
                      },
                      "disabled": false
                  },
                  {
                      "listen": "test",
                      "script": {
                          "id": "28dc4f71-73bd-49cb-a6bd-8b41a06a3b36",
                          "type": "text/javascript",
                          "exec": [
                              ""
                          ]
                      },
                      "disabled": true
                  }
              ]
          }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "collection": {
              "id": "12ece9e1-2abf-4edc-8e34-de66e74114d2",
              "name": "Test Collection v2",
              "description": "This is a sample collection that makes a request to the Postman Echo service. It returns a list of request headers sent by an HTTP client."
          }
      }
order: 3000

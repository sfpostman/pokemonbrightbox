$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionId
  method: PATCH
  pathVariables:
    collectionId: 12ece9e1-2abf-4edc-8e34-de66e74114d2
  body:
    type: json
    content: |-
      {
          "collection": {
              "auth": {
                  "type": "apikey",
                  "apikey": [
                      {
                          "key": "value",
                          "value": "{{apiKey}}"
                      },
                      {
                          "key": "key",
                          "value": "api-key"
                      },
                      {
                          "key": "in",
                          "value": "header"
                      }
                  ]
              }
          }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "collection": {
              "id": "12ece9e1-2abf-4edc-8e34-de66e74114d2",
              "name": "Test Collection v2",
              "description": "This is a sample collection that makes a request to the Postman Echo service. It returns a list of request headers sent by an HTTP client."
          }
      }
order: 4000

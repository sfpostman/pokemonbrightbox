$kind: http-request
description: |-
  Replaces the contents of a collection asynchronously. Include the collection's ID values in the request body. If you do not, the endpoint removes the existing items and creates new items. Use the GET `/collection-updates-tasks/{taskId}` endpoint to get the collection's update status.

  - For a complete list of properties and information, see the [Postman Collection Format documentation](https://schema.postman.com/collection/json/v2.1.0/draft-07/docs/index.html).
      
  - For protocol profile behavior, refer to Postman's [Protocol Profile Behavior](https://github.com/postmanlabs/postman-runtime/blob/develop/docs/protocol-profile-behavior.md) documentation.
      

  **Note:**

  - The maximum collection size this endpoint accepts cannot exceed 100 MB.
      
  - This request uses example values in the request body for context when replacing a collection's data. For additional ways to replace collection data, see the collection's examples.
      
  - If you don't include the collection items' ID values from the request body, the endpoint **removes** the existing items and recreates the items with new ID values.
      
  - To copy another collection's contents to the given collection, remove all ID values before you pass it in this endpoint. If you do not, this endpoint returns an error. These values include the `id`, `uid`, and `postman_id` values.
url: "{{baseUrl}}/collections/:collectionId"
method: PUT
headers:
  - key: Prefer
    value: respond-async
    description: The `respond-async` header to perform the update asynchronously.
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's ID.

$kind: http-example
request:
  url: https://api.getpostman.com/collection-requests-transfers
  method: POST
  body:
    type: json
    content: |-
      {
          "ids": [
              "12345678-3a2069a1-aeb6-462c-ada0-8629858199ba"
          ],
          "target": {
              "model": "folder",
              "id": "12345678-bcb5648b-eecb-4468-ade7-4efb38431bb9"
          },
          "location": {
              "position": "start",
              "model": null,
              "id": null
          },
          "mode": "move"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |
      {
          "type": "Error",
          "title": "Target folder 12345678-bcb5648b-eecb-4468-ade7-4efb38431bb9 not found",
          "detail": {}
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "description": "The type of error."
              },
              "title": {
                  "type": "string",
                  "default": "A short summary of the problem."
              },
              "detail": {
                  "type": "object",
                  "description": "Information about the error."
              }
          }
      }
order: 5000

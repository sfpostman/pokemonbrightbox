$kind: http-request
description: Copies or moves responses into a request.
url: "{{baseUrl}}/collection-responses-transfers"
method: POST
body:
  type: json
  content: |-
    {
        "ids": [
            "{{responseUid}}"
        ],
        "target": {
            "model": "request",
            "id": "{{modelUid}}"
        },
        "location": {
            "position": "{{position}}",
            "model": "response",
            "id": "{{modelUid}}"
        },
        "mode": "{{modeType}}"
    }
  $type: |-
    {
        "type": "object",
        "required": ["ids", "target", "location", "mode"],
        "properties": {
            "ids": {
                "type": "array",
                "description": "A list of collection response UIDs to transfer.",
                "items": {
                    "type": "string",
                    "format": "uuid"
                }
            },
            "target": {
                "type": "object",
                "description": "Information about the item transfer's destination location.",
                "required": ["model", "id"],
                "properties": {
                    "model": {
                        "type": "string",
                        "description": "The collection, folder, or request that the items will be transferred to. For response transfers, use the `request` value.",
                        "enum": ["request"]
                    },
                    "id": {
                        "type": "string",
                        "description": "The UID of the destination collection, folder, or request."
                    }
                }
            },
            "location": {
                "type": "object",
                "description": "The transferred items' placement in the target destination:\n- For `start` or `end` — Do not include the `model` and `id` values.\n- For `before` or `after` — Include the `model` and `id` properties.",
                "required": ["position"],
                "properties": {
                    "position": {
                        "type": "string",
                        "description": "The transferred item's position within the destination object.",
                        "enum": ["start", "end", "before", "after"]
                    },
                    "model": {
                        "type": "string",
                        "description": "For `before` or `after` positions, the type of item (model) that the transferred item will be positioned by.",
                        "enum": ["response"]
                    },
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "description": "For `before` or `after` positions, the model's UID."
                    }
                }
            },
            "mode": {
                "type": "string",
                "description": "The transfer operation to perform.",
                "enum": ["copy", "move"]
            }
        }
    }
examples: ./.resources/Transfer responses.resources/examples
order: 3000

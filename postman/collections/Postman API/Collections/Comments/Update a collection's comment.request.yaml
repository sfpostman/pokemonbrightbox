$kind: http-request
description: |-
  Updates a comment on a collection.

  **Note:**

  This endpoint accepts a max of 10,000 characters.
url: "{{baseUrl}}/collections/:collectionUid/comments/:commentId"
method: PUT
pathVariables:
  - key: collectionUid
    value: ""
    description: The collection's unique ID.
  - key: commentId
    value: ""
    description: The comment's ID.
body:
  type: json
  content: |-
    {
        "body": "{{comment}}",
        "tags": {
            "{{userName}}": {
                "type": "user",
                "id": "{{userId}}"
            }
        }
    }
examples: ./.resources/Update a collection's comment.resources/examples
order: 3000

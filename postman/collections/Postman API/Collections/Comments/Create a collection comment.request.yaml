$kind: http-request
description: |-
  Creates a comment on a collection.

  **Note:**

  This endpoint accepts a max of 10,000 characters.
url: "{{baseUrl}}/collections/:collectionUid/comments"
method: POST
pathVariables:
  - key: collectionUid
    value: ""
    description: The collection's unique ID.
body:
  type: json
  content: |-
    {
        "body": "{{comment}}",
        "threadId": "{{threadId}}",
        "tags": {
            "{{userName}}": {
                "type": "user",
                "id": "{{userId}}"
            }
        }
    }
examples: ./.resources/Create a collection comment.resources/examples
order: 2000

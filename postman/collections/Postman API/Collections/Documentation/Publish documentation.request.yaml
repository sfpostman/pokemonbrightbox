$kind: http-request
description: |-
  Publishes a collection's documentation. This makes it publicly available to anyone with the link to the documentation.

  **Note:**

  - Your [Postman plan](https://www.postman.com/pricing/) impacts your use of these endpoints:
      
      - For **Free** and **Solo** users, you must have permissions to edit the collection.
          
      - If [API Governance and Security](https://learning.postman.com/docs/api-governance/configurable-rules/configurable-rules-overview/) is enabled for your [<b>Enterprise</b>](https://www.postman.com/pricing/) team, only users with the [Community Manager role](https://learning.postman.com/docs/collaborating-in-postman/roles-and-permissions/#team-roles) can publish documentation.
          
  - Publishing is only supported for collections with HTTP requests.
      
  - You cannot publish a collection added to an API.
url: "{{baseUrl}}/collections/:collectionId/public-documentations"
method: PUT
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's unique ID.
body:
  type: json
  content: |-
    {
        "environmentUid": "{{environmentUid}}",
        "customColor": {
            "highlight": "{{colorCode}}",
            "rightSidebar": "{{colorCode}}",
            "topBar": "{{colorCode}}"
        },
        "documentationLayout": "{{documentationLayout}}",
        "customization": {
            "metaTags": [
                {
                    "name": "title",
                    "value": "{{documentTitle}}"
                },
                {
                    "name": "description",
                    "value": "{{documentDescription}}"
                }
            ],
            "appearance": {
                "default": "dark",
                "themes": [
                    {
                        "name": "dark",
                        "colors": {
                            "highlight": "{{colorCode}}",
                            "rightSidebar": "{{colorCode}}",
                            "topBar": "{{colorCode}}"
                        },
                        "logo": "<s3_url>/<cloudfront_url>"
                    },
                    {
                        "name": "light",
                        "colors": {
                            "highlight": "{{colorCode}}",
                            "rightSidebar": "{{colorCode}}",
                            "topBar": "{{colorCode}}"
                        },
                        "logo": "<s3_url>/<cloudfront_url>"
                    }
                ]
            }
        }
    }
examples: ./.resources/Publish documentation.resources/examples
order: 1000

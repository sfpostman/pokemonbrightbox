$kind: http-request
description: |-
  Publishes a collection's documentation. This makes it publicly available to anyone with the link to the documentation.

  **Note:**

  - Your [Postman plan](https://www.postman.com/pricing/) impacts your use of these endpoints:
      
      - For **Free** and **Solo** users, you must have permissions to edit the collection.
          
      - If [API Governance and Security](https://learning.postman.com/docs/api-governance/configurable-rules/configurable-rules-overview/) is enabled for your [<b>Enterprise</b>](https://www.postman.com/pricing/) team, only users with the [Community Manager role](https://learning.postman.com/docs/collaborating-in-postman/roles-and-permissions/#team-roles) can publish documentation.
          
  - Publishing is only supported for collections with HTTP requests.
      
  - You cannot publish a collection added to an API.
url: "{{baseUrl}}/collections/:collectionId/public-documentations"
method: PUT
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's unique ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "environmentUid": "{{environmentUid}}",
        "customColor": {
            "highlight": "{{colorCode}}",
            "rightSidebar": "{{colorCode}}",
            "topBar": "{{colorCode}}"
        },
        "documentationLayout": "{{documentationLayout}}",
        "customization": {
            "metaTags": [
                {
                    "name": "title",
                    "value": "{{documentTitle}}"
                },
                {
                    "name": "description",
                    "value": "{{documentDescription}}"
                }
            ],
            "appearance": {
                "default": "dark",
                "themes": [
                    {
                        "name": "dark",
                        "colors": {
                            "highlight": "{{colorCode}}",
                            "rightSidebar": "{{colorCode}}",
                            "topBar": "{{colorCode}}"
                        },
                        "logo": "<s3_url>/<cloudfront_url>"
                    },
                    {
                        "name": "light",
                        "colors": {
                            "highlight": "{{colorCode}}",
                            "rightSidebar": "{{colorCode}}",
                            "topBar": "{{colorCode}}"
                        },
                        "logo": "<s3_url>/<cloudfront_url>"
                    }
                ]
            }
        }
    }
  $type: |-
    {
        "type": "object",
        "required": ["customColor","customization"],
        "properties": {
            "environmentUid": {
                "type": "string",
                "format": "uuid",
                "description": "The unique ID of the environment to publish with the documentation. The initial values of all variables are published with the documentation. Make certain they don't contain sensitive information such as passwords or tokens."
            },
            "customColor": {
                "type": "object",
                "description": "The theme's colors, in six digit hexcode. The values in this object must match the hexcode values of either the `light` or `dark` theme defined in the `appearance` object.",
                "properties": {
                    "highlight": {
                        "type": "string",
                        "description": "The hexcode color code for the documentation's highlighting."
                    },
                    "rightSidebar": {
                        "type": "string",
                        "description": "The hexcode color code for the documentation's right sidebar color."
                    },
                    "topBar": {
                        "type": "string",
                        "description": "The hexcode color code for the documentation's top bar color."
                    }
                }
            },
            "documentationLayout": {
                "type": "string",
                "default": "classic-single-column",
                "description": "The documentation's default layout style:\n- `classic-single-column` — Displays sample code inline beneath each request.\n- `classic-double-column` — Displays sample code in a column next to the documentation.",
                "enum": ["classic-single-column","classic-double-column"]
            },
            "customization": {
                "type": "object",
                "description": "Information about the documentation's customization.",
                "properties": {
                    "metaTags": {
                        "type": "array",
                        "description": "The key-pair values that contain the documentation's `title` and `description` metadata information.",
                        "items": {
                            "type": "object",
                            "required": ["name", "value"],
                            "properties": {
                                "name": {
                                    "type": "string",
                                    "description": "The key's name:\n  - `title` — The title of your documentation. This value appears in relevant search queries and browser tabs. By default, the system uses the collection's name for the documentation title.\n  - `description` — The documentation's description. This provides brief information about your document and lets users know what it contains. By default, the system uses the collection's description content."
                                },
                                "value": {
                                    "type": "string",
                                    "description": "The `name` key's value."
                                }
                            }
                        }
                    },
                    "appearance": {
                        "type": "object",
                        "description": "Information about the documentation appearance, such as colors and theme.",
                        "properties": {
                            "default": {
                                "type": "string",
                                "description": "The default color theme (`light` or `dark`). Documentation uses the given theme value by default.",
                                "enum": ["light", "dark"]
                            },
                            "themes": {
                                "type": "array",
                                "description": "A list of theme settings for the `light` and `dark` themes.",
                                "items": {
                                    "type": "object",
                                    "properties": {
                                        "name": {
                                            "type": "string",
                                            "description": "The `light` or `dark` theme.",
                                            "enum": ["light", "dark"]
                                        },
                                        "colors": {
                                            "type": "object",
                                            "description": "The theme's colors, in six digit hexcode. The values in this object must match the hexcode values of either the `light` or `dark` theme defined in the `appearance` object.",
                                            "properties": {
                                                "highlight": {
                                                    "type": "string",
                                                    "description": "The hexcode color code for the documentation's highlighting."
                                                },
                                                "rightSidebar": {
                                                    "type": "string",
                                                    "description": "The hexcode color code for the documentation's right sidebar color."
                                                },
                                                "topBar": {
                                                    "type": "string",
                                                    "description": "The hexcode color code for the documentation's top bar color."
                                                }
                                            }
                                        },
                                        "logo": {
                                            "type": "string",
                                            "description": "The URL to the documentation's logo image. By default, public documentation uses your team logo."
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
examples: ./.resources/Publish documentation.resources/examples
order: 1000

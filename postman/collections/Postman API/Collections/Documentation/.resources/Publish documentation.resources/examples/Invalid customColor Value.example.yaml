$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionId/public-documentations
  method: PUT
  pathVariables:
    collectionId: 12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2
  body:
    type: json
    content: |-
      {
          "environmentUid": "12345678-f84a5105-a495-49db-aa6b-db02c9ed1023",
          "customColor": {
              "highlight": "EF5B25",
              "rightSidebar": "303030",
              "topBar": "FFFFFF"
          },
          "documentationLayout": "classic-single-column",
          "customization": {
              "metaTags": [
                  {
                      "name": "title",
                      "value": "Billing API"
                  },
                  {
                      "name": "description",
                      "value": "This documentation contains the endpoints for the Billing API."
                  }
              ],
              "appearance": {
                  "default": "dark",
                  "themes": [
                      {
                          "name": "dark",
                          "colors": {
                              "highlight": "4D5F75",
                              "rightSidebar": "303030",
                              "topBar": "FFFFFF"
                          },
                          "logo": "<s3_url>/<cloudfront_url>"
                      },
                      {
                          "name": "light",
                          "colors": {
                              "highlight": "734D75",
                              "rightSidebar": "303030",
                              "topBar": "FFFFFF"
                          },
                          "logo": "<s3_url>/<cloudfront_url>"
                      }
                  ]
              }
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "title": "Bad Request",
          "detail": "The request contains following incorrect or missing fields: light theme and customColor",
          "status": 400
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              }
          }
      }
order: 3000

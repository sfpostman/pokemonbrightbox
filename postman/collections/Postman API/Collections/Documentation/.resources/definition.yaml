$kind: collection
description: |-
  The **Documentation** endpoints enable you to manage your [published documentation](https://learning.postman.com/docs/publishing-your-api/publishing-your-docs/). To publish documentation, it must be part of a collection. Publishing your documentation makes it publicly available to anyone with the link to the documentation.

  **Note:**

  Your [Postman plan](https://www.postman.com/pricing/) impacts your use of these endpoints:

  - For **Free** and **Solo** users, you must have permissions to edit the collection.
      
  - If [API Security and Governance](https://learning.postman.com/docs/api-governance/configurable-rules/configurable-rules-overview/) is enabled for your [<b>Enterprise</b>](https://www.postman.com/pricing/) team, only users with the [Community Manager role](https://learning.postman.com/docs/collaborating-in-postman/roles-and-permissions/#team-roles) can publish documentation.
order: 3000

$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionId/folders
  method: POST
  pathVariables:
    collectionId: 12ece9e1-2abf-4edc-8e34-de66e74114d2
  body:
    type: json
    content: |-
      {
          "name": "Test Folder",
          "description": "This is a test collection folder."
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "instanceFoundError",
              "message": "This folder already exists in the database.",
              "details": {
                  "model": "folder",
                  "model_id": "65a99e60-8e0a-4b6e-b79c-7d8264cc5caa",
                  "owner": "12345678"
              }
          }
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "error": {
                  "type": "object",
                  "properties": {
                      "name": {
                          "type": "string",
                          "description": "The error name."
                      },
                      "message": {
                          "type": "string",
                          "description": "The error message."
                      },
                      "details": {
                          "type": "object",
                          "description": "Information about the error.",
                          "properties": {
                              "model": {
                                  "type": "string",
                                  "description": "The resource name."
                              },
                              "model_id": {
                                  "type": "string",
                                  "description": "The folder's ID."
                              },
                              "owner": {
                                  "type": "string",
                                  "description": "The user ID of the folder's owner."
                              }
                          }
                      }
                  }
              }
          }
      }
order: 4000

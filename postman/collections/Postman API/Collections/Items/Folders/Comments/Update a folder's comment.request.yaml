$kind: http-request
description: |-
  Updates a comment on a folder.

  **Note:**

  This endpoint accepts a max of 10,000 characters.
url: "{{baseUrl}}/collections/:collectionUid/folders/:folderUid/comments/:commentId"
method: PUT
pathVariables:
  - key: collectionUid
    value: ""
    description: The collection's unique ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
  - key: folderUid
    value: ""
    description: The folder's unique ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
  - key: commentId
    value: ""
    description: The comment's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "body": "{{comment}}",
        "tags": {
            "{{userName}}": {
                "type": "user",
                "id": "{{userId}}"
            }
        }
    }
  $type: |-
    {
        "type": "object",
        "description": "Information about the comment.",
        "required": ["body"],
        "properties": {
            "body": {
                "type": "string",
                "description": "The contents of the comment."
            },
            "tags": {
                "type": "object",
                "description": "Information about users tagged in the `body` comment.",
                "properties": {
                    "{{userName}}": {
                        "type": "object",
                        "description": "An object that contains information about the tagged user. The object's name is the user's Postman username. For example, `@user-postman`.",
                        "required": ["type", "id"],
                        "properties": {
                            "type": {
                                "type": "string",
                                "description": "The `user` value.",
                                "enum": ["user"]
                            },
                            "id": {
                                "type": "string",
                                "description": "The user's ID."
                            }
                        }
                    }
                }
            }
        }
    }
examples: ./.resources/Update a folder's comment.resources/examples
order: 3000

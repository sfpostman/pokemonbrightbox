$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionUid/folders/:folderUid/comments
  method: GET
  pathVariables:
    collectionUid: 12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2
    folderUid: 12345678-65a99e60-8e0a-4b6e-b79c-7d8264cc5caa
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "data": [
              {
                  "id": 46818,
                  "threadId": 12345,
                  "status": "Open",
                  "createdBy": 12345678,
                  "createdAt": "2024-01-18T12:00:54.000Z",
                  "updatedAt": "2024-01-18T12:00:54.000Z",
                  "body": "This is also an example."
              },
              {
                  "id": 46817,
                  "threadId": 67890,
                  "status": "Resolved",
                  "createdBy": 87654321,
                  "createdAt": "2024-01-18T11:48:01.000Z",
                  "updatedAt": "2024-01-18T11:48:01.000Z",
                  "body": "Another example."
              },
              {
                  "id": 46814,
                  "threadId": 23456,
                  "status": "Open",
                  "createdBy": 12345678,
                  "createdAt": "2024-01-18T11:30:40.000Z",
                  "updatedAt": "2024-01-18T11:30:40.000Z",
                  "body": "This is an example."
              }
          ]
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "data": {
                  "type": "array",
                  "description": "A list of comments.",
                  "items": {
                      "type": "object",
                      "description": "Information about the comment.",
                      "properties": {
                          "id": {
                              "type": "integer",
                              "description": "The comment's ID."
                          },
                          "threadId": {
                              "type": "integer",
                              "description": "The comment's thread ID."
                          },
                          "status": {
                              "type": "string",
                              "enum": ["Open", "Resolved"],
                              "description": "The comment's current status."
                          },
                          "createdBy": {
                              "type": "integer",
                              "description": "The user ID of the user who created the comment."
                          },
                          "createdAt": {
                              "type": "string",
                              "format": "date-time",
                              "description": "The date and time at which the comment was created."
                          },
                          "updatedAt": {
                              "type": "string",
                              "format": "date-time",
                              "description": "The date and time when the comment was last updated."
                          },
                          "body": {
                              "type": "string",
                              "description": "The contents of the comment."
                          }
                      }
                  }
              }
          }
      }
order: 1000

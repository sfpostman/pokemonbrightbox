$kind: http-request
description: |-
  Deletes a comment from a folder. On success, this returns an HTTP `204 No Content` response.

  **Note:**

  Deleting the first comment of a thread deletes all the comments in the thread.
url: "{{baseUrl}}/collections/:collectionUid/folders/:folderUid/comments/:commentId"
method: DELETE
pathVariables:
  - key: collectionUid
    value: ""
    description: The collection's unique ID.
  - key: folderUid
    value: ""
    description: The folder's unique ID.
  - key: commentId
    value: ""
    description: The comment's ID.
examples: ./.resources/Delete a folder's comment.resources/examples
order: 4000

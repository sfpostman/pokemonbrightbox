$kind: http-request
description: Gets information about a folder in a collection.
url: "{{baseUrl}}/collections/:collectionId/folders/:folderId"
method: GET
queryParams:
  - key: ids
    value: "true"
    disabled: true
    description: If true, returns only the folder properties that contain ID values.
  - key: uid
    value: "true"
    disabled: true
    description: If true, returns all IDs in UID format (`userId`-`id`).
  - key: populate
    value: "true"
    disabled: true
    description: If true, returns all of a folder's contents.
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's ID.
  - key: folderId
    value: ""
    description: The folder's ID.
examples: ./.resources/Get a folder.resources/examples
order: 2000

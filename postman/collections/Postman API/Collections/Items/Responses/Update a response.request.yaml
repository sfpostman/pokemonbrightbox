$kind: http-request
description: |-
  Updates a response in a collection. For a complete list of properties and information, see the [Postman Collection Format documentation](https://schema.postman.com/collection/json/v2.1.0/draft-07/docs/index.html).

  **Note:**

  - This request uses example values in the request body for context when updating collection responses. For additional ways to create a response, see the collection's examples.
      
  - You must pass a collection ID (`12ece9e1-2abf-4edc-8e34-de66e74114d2`), not a collection UID (`12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2`), in this endpoint.
      
  - This endpoint acts like a PATCH method. It only updates the values that you pass in the request body (for example, the `name` property). The endpoint does **not** update the entire resource.
url: "{{baseUrl}}/collections/:collectionId/responses/:responseId"
method: PUT
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's ID.
  - key: responseId
    value: ""
    description: The response's ID.
body:
  type: json
  content: |-
    {
        "name": "Successful Response",
        "responseCode": {
            "code": 200,
            "name": "OK"
        },
        "headers": [
            {
                "key": "Content-Type",
                "value": "application/json",
                "description": "",
                "type": "text"
            }
        ],
        "cookies": [
            ""
        ],
        "mime": "",
        "text": "{\n    \"id\": \"405775fe15ed41872a8eea4c8aa2b38cda9749812cc55c99\",\n    \"userName\": \"taylor-lee@example.com\",\n    \"name\": \"Taylor Lee\",\n    \"email\": \"taylor-lee@example.com\",\n    \"active\": true\n}",
        "language": "json",
        "requestObject": "{\"data\":null,\"dataMode\":\"raw\",\"dataOptions\":{\"raw\":{\"language\":\"json\"}},\"headerData\":[{\"key\":\"Content-Type\",\"value\":\"application/json\"}],\"method\":\"POST\",\"pathVariableData\":[{\"key\":\"id\",\"value\":\"{{value}}\"}],\"queryParams\":[{\"key\":\"active\",\"value\":\"{{boolean}}\",\"description\":\"\",\"enabled\":true,\"equals\":true}],\"url\":\"https://postman-echo.com/user/:id?active={{boolean}}\",\"headers\":\"Content-Type: application/json\\n\",\"pathVariables\":{\"id\":\"{{value}}\"},\"protocolProfileBehavior\":{\"disableBodyPruning\":true},\"rawModeData\":\"{\\n    \\\"name\\\": \\\"{{value}}\\\",\\n    \\\"email\\\": \\\"{{email}}\\\",\\n    \\\"username\\\": \\\"{{username}}\\\"\\n}\",\"graphqlModeData\":{}}"
    }
examples: ./.resources/Update a response.resources/examples
order: 4000

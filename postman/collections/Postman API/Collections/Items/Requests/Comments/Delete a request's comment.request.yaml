$kind: http-request
description: |-
  Deletes a comment from a request. On success, this returns an HTTP `204 No Content` response.

  **Note:**

  Deleting the first comment of a thread deletes all the comments in the thread.
url: "{{baseUrl}}/collections/:collectionUid/requests/:requestUid/comments/:commentId"
method: DELETE
pathVariables:
  - key: collectionUid
    value: ""
    description: The collection's unique ID.
  - key: requestUid
    value: ""
    description: The request's unique ID.
  - key: commentId
    value: ""
    description: The comment's ID.
examples: ./.resources/Delete a request's comment.resources/examples
order: 4000

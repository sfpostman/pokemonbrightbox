$kind: http-request
description: |-
  Creates a request in a collection. For a complete list of properties and information, see the [Postman Collection Format documentation](https://schema.postman.com/collection/json/v2.1.0/draft-07/docs/index.html).

  **Note:**

  - This request uses example values in the request body for context when creating detailed collection requests. For additional ways to create a request, see the collection's examples.
      
  - It is recommended to include at least the `name` property in the request to avoid creating a request with a blank name.
url: "{{baseUrl}}/collections/:collectionId/requests"
method: POST
queryParams:
  - key: folder
    value: ""
    disabled: true
    description: |-
      The folder ID in which to create the request.

      By default, the system will create the request at the collection level.
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's ID.
body:
  type: json
  content: |-
    {
        "name": "POST request",
        "auth": {
            "type": "apikey",
            "apikey": [
                {
                    "key": "value",
                    "value": "XXX"
                },
                {
                    "key": "key",
                    "value": "api-key"
                }
            ]
        },
        "events": [
            {
                "listen": "test",
                "script": {
                    "exec": [
                        "pm.test(\"Status code is 200\", function () {",
                        "    pm.response.to.have.status(200);",
                        "});"
                    ],
                    "type": "text/javascript"
                }
            },
            {
                "listen": "prerequest",
                "script": {
                    "exec": [
                        ""
                    ],
                    "type": "text/javascript"
                }
            }
        ],
        "dataMode": "raw",
        "dataOptions": {
            "raw": {
                "language": "json"
            }
        },
        "rawModeData": "{\n    \"name\": \"{{value}}\",\n    \"email\": \"{{email}}\",\n    \"username\": \"{{username}}\"\n}",
        "description": "This is an example request.",
        "headers": "Content-Type: application/json\n",
        "method": "POST",
        "url": "https://postman-echo.com/user/:id?active={{boolean}}",
        "preRequestScript": "pm.collectionVariables.get(\"id\");",
        "tests": "pm.test(\"Body matches string\", function () {\n    pm.expect(pm.response.text()).to.include(\"string_you_want_to_search\");\n});",
        "queryParams": [
            {
                "key": "active",
                "value": true,
                "description": "",
                "enabled": false
            }
        ],
        "pathVariables": {
            "id": "{{value}}"
        },
        "pathVariableData": [
            {
                "key": "id",
                "value": "{{value}}",
                "description": "The user's ID."
            }
        ],
        "protocolProfileBehavior": {
            "disableBodyPruning": true
        }
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "name": {
                "type": "string",
                "description": "The request's name."
            },
            "auth": {
                "type": "object",
                "description": "The [authorization type supported by Postman](https://learning.postman.com/docs/sending-requests/authorization/authorization-types/).",
                "properties": {
                    "type": {
                        "type": "string",
                        "description": "The authorization type."
                    },
                    "apikey": {
                        "type": "array",
                        "description": "This property is the name of the authorization `type` value.",
                        "items": {
                            "type": "object",
                            "properties": {
                                "key": {
                                    "type": "string",
                                    "description": "The auth method's key value."
                                },
                                "value": {
                                    "type": "string",
                                    "anyOf": [
                                        {
                                            "type": "string",
                                            "title": "string"
                                        },
                                        {
                                            "type": "array",
                                            "title": "array",
                                            "items": {
                                                "type": "object"
                                            }
                                        }
                                    ],
                                    "description": "The key's value. This property's type can change, depending on the selected auth type."
                                }
                            }
                        }
                    }
                }
            },
            "events": {
                "type": "array",
                "description": "A list of scripts configured to run when specific events occur. These scripts can be referenced in the collection by their ID.",
                "items": {
                    "type": "object",
                    "description": "Information about the collection's events.",
                    "properties": {
                        "listen": {
                            "type": "string",
                            "description": "Can be set to `test` or `prerequest` for test scripts or pre-request scripts respectively."
                        },
                        "script": {
                            "type": "object",
                            "description": "Information about the JavaScript code that can be used to to perform setup or teardown operations in a response.",
                            "properties": {
                                "exec": {
                                    "type": "array",
                                    "description": "A list of script strings, where each line represents a line of code. Separate lines makes it easy to track script changes.",
                                    "items": {
                                        "type": "string"
                                    }
                                },
                                "type": {
                                    "type": "string",
                                    "description": "The type of script. For example, `text/javascript`."
                                }
                            }
                        }
                    }
                }
            },
            "dataMode": {
                "type": "string",
                "description": "The request's data mode."
            },
            "dataOptions": {
                "type": "object",
                "description": "The request body's data mode options.",
                "properties": {
                    "raw": {
                        "type": "object",
                        "properties": {
                            "language": {
                                "type": "string"
                            }
                        }
                    }
                }
            },
            "rawModeData": {
                "type": "string",
                "description": "The stringified raw contents of the request body."
            },
            "description": {
                "type": "string",
                "description": "The request's description."
            },
            "headers": {
                "type": "string",
                "description": "The request's stringified headers."
            },
            "method": {
                "type": "string",
                "description": "The request's method."
            },
            "url": {
                "type": "string",
                "description": "The request's URL."
            },
            "preRequestScript": {
                "type": "string",
                "description": "The request's stringified pre-request script."
            },
            "tests": {
                "type": "string",
                "description": "The request's stringified post-request scripts."
            },
            "queryParams": {
                "type": "array",
                "description": "A list of the request's query parameters.",
                "items": {
                    "type": "object",
                    "properties": {
                        "key": {
                            "type": "string",
                            "description": "The key value."
                        },
                        "value": {
                            "type": ["string", "boolean", "integer"],
                            "description": "The key's value."
                        },
                        "description": {
                            "type": "string",
                            "description": "The query parameter's description."
                        },
                        "enabled": {
                            "type": "boolean",
                            "description": "If true, the query parameter is enabled."
                        }
                    }
                }
            },
            "pathVariables": {
                "type": "object",
                "description": "Information about the request's path variables.",
                "properties": {
                    "id": {
                        "type": "string"
                    }
                }
            },
            "pathVariableData": {
                "type": "array",
                "description": "A list of the request's path variables.",
                "items": {
                    "type": "object",
                    "properties": {
                        "key": {
                            "type": "string",
                            "description": "The key value."
                        },
                        "value": {
                            "type": ["string", "boolean", "integer"],
                            "description": "The key's value."
                        },
                        "description": {
                            "type": "string",
                            "description": "The request variable's description."
                        }
                    }
                }
            },
            "protocolProfileBehavior": {
                "type": "object",
                "description": "The [settings](https://learning.postman.com/docs/sending-requests/create-requests/request-settings/) used to alter the [Protocol Profile Behavior](https://github.com/postmanlabs/postman-runtime/blob/develop/docs/protocol-profile-behavior.md) of sending a request.",
                "properties": {
                    "disableBodyPruning": {
                        "type": "boolean"
                    }
                }
            }
        }
    }
examples: ./.resources/Create a request.resources/examples
order: 3000

$kind: http-request
description: Gets information about all [roles](https://learning.postman.com/docs/collaborating-in-postman/roles-and-permissions/#collection-roles) in a collection. The response returns the IDs of all users, teams, and groups with access to view or edit the collection.
url: "{{baseUrl}}/collections/:collectionId/roles"
method: GET
pathVariables:
  - key: collectionId
    value: ""
    description: The collection's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Get a collection's roles.resources/examples
order: 1000

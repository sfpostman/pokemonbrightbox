$kind: http-example
request:
  url: https://api.getpostman.com/collections/:collectionUid/pull-requests
  method: POST
  pathVariables:
    collectionUid: 12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2
  body:
    type: json
    content: |-
      {
          "title": "Test PR",
          "description": "This is a test pull request.",
          "reviewers": [
              "87654321",
              "56781234"
          ],
          "destinationId": "12345678-ec548788-unftw-rgn8-83b8-0b59798648e4"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "title": "Duplicate pull request",
          "detail": "A pull request for this source and destination already exists.",
          "status": 400
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              }
          }
      }
order: 2000

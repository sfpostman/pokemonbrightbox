$kind: http-request
description: |-
  Generates an OAuth 2.0 access token for a client application using the `client_credentials` grant type. Use this endpoint with backend services or bots to authenticate and authorize API requests without user interaction.

  **Note:**

  This endpoint uses Basic Auth. You must pass a valid client ID and client secret for the username and password, respectively.
url: "{{baseUrl}}/oauth2/token"
method: POST
body:
  type: json
  content: |-
    {
        "installationAuthId": "{{installationAuthId}}",
        "grant_type": "client_credentials",
        "jwt": "{{jwtToken}}"
    }
  $type: |-
    {
        "type": "object",
        "required": ["installationAuthId", "grant_type", "jwt"],
        "properties": {
            "installationAuthId": {
                "type": "string",
                "description": "The client's installation authentication ID."
            },
            "grant_type": {
                "type": "string",
                "enum": ["client_credentials"],
                "description": "The `client_credentials` OAuth grant type."
            },
            "jwt": {
                "type": "string",
                "description": "A signed JWT token. The token must include `iss` (issuer), `aud` (audience), `iat` (issued at), `exp` (expiration timestamp), and `jti` (JWT ID)."
            }
        }
    }
auth:
  type: basic
  credentials:
    password: "{{clientSecret}}"
    username: "{{clientId}}"
examples: ./.resources/Generate an OAuth Token.resources/examples
order: 1000

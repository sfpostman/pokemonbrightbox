$kind: http-request
description: |-
  Updates an element or folder in your team's [Private API Network](https://learning.postman.com/docs/collaborating-in-postman/adding-private-network/). When you call this endpoint, the `elementType` property must be the `api`, `folder`, `collection`, or `workspace` value.

  The `elementId` value is the `api`, `folder`, or `workspace` element's ID. For `collection`, this value is the collection's UID (`userId`\-`collectionId`).

  Include the following in the request body object:

  - `elementType` — The Private API Network element type. The object's name must be one of the following:
      - `api`
          
      - `folder`
          
      - `collection`
          
      - `workspace`
          

  In the `elementType` object, include the following values:

  - `parentFolderId` — A **string** value that contains the element's new Private API Network folder ID.
      

  **For Collections:**

  - `summary` — A **string** value that contains the collection's new summary.
      

  **For Private API Network Folders:**

  You can include the following optional properties:

  - `description` — A **string** value that contains the folder's new description.
      
  - `name` — A **string** value that contains the folder's new name.
url: "{{baseUrl}}/network/private/:elementType/:elementId"
method: PUT
pathVariables:
  - key: elementType
    value: "{{elementType}}"
    description: "The element type: `api`, `folder`, `collection`, or `workspace`"
  - key: elementId
    value: "{{elementId}}"
    description: The element's ID or UUID. For Postman Collections you must pass the collection's UID (`userId`-`collectionId`) value.
body:
  type: json
  content: |-
    {
        "{{elementType}}": {
            "parentFolderId": {{parentFolderId}}
        }
    }
examples: ./.resources/Update an element or folder.resources/examples
order: 4000

$kind: http-request
description: |-
  Removes an element or delete a folder from your team's [Private API Network](https://learning.postman.com/docs/collaborating-in-postman/adding-private-network/).

  **Note:**

  Removing an API, collection, or workspace element does not delete it. It only removes it from the Private API Network folder.
url: "{{baseUrl}}/network/private/:elementType/:elementId"
method: DELETE
pathVariables:
  - key: elementType
    value: "{{elementType}}"
    description: "The element type: `api`, `folder`, `collection`, or `workspace`"
  - key: elementId
    value: "{{elementId}}"
    description: The element's ID or UUID. For Postman Collections you must pass the collection's UID (`userId`-`collectionId`) value.
examples: ./.resources/Remove an element or folder.resources/examples
order: 5000

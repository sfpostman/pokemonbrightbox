$kind: http-example
request:
  url: https://api.getpostman.com/apis/:apiId/versions
  method: POST
  pathVariables:
    apiId: 90ca9f5a-c4c4-11ed-afa1-0242ac120002
  body:
    type: json
    content: |-
      {
          "name": "Release 1.5",
          "releaseNotes": "This is the first public release update.",
          "collections": [
              {
                  "filePath": "path/to/collection1.json"
              },
              {
                  "filePath": "path/to/collection2.json"
              }

          ],
          "schemas": [
              {
                  "directoryPath": "postman/schemas"
              }
          ],
          "branch": "develop"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "instanceNotFoundError",
              "message": "API not found. For v10 and later APIs, ensure that your request sends the \"application/vnd.api.v10+json\" Accept header."
          }
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "error": {
                  "type": "object",
                  "properties": {
                      "name": {
                          "type": "string",
                          "description": "The error name."
                      },
                      "message": {
                          "type": "string",
                          "description": "The error message."
                      }
                  }
              }
          }
      }
order: 5000

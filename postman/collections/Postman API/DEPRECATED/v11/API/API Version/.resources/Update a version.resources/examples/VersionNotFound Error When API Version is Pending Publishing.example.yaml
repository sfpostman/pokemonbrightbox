$kind: http-example
request:
  url: https://api.getpostman.com/apis/:apiId/versions/:versionId
  method: PUT
  headers:
    Accept: application/vnd.api.v10+json
  pathVariables:
    apiId: 90ca9f5a-c4c4-11ed-afa1-0242ac120002
    versionId: 3563baaa-07a2-46ed-9fd2-0e8a3c5f7ec2
  body:
    type: json
    content: |-
      {
          "name": "Release 1.5",
          "releaseNotes": "This is the first public release update."
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: json
    content: |-
      {
          "type": "VersionNotFound",
          "title": "API Version not found.",
          "details": "We could not find the API Version you are looking for."
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "description": "The type of error."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              }
          }
      }
order: 5000

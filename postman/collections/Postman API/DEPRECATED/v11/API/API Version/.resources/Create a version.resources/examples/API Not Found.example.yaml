$kind: http-example
request:
  url: https://api.getpostman.com/apis/:apiId/versions
  method: POST
  headers:
    Accept: application/vnd.api.v10+json
  pathVariables:
    apiId: 90ca9f5a-c4c4-11ed-afa1-0242ac120002
  body:
    type: json
    content: |-
      {
          "name": "Release 1.5",
          "releaseNotes": "This is the first public release update.",
          "collections": [
              {
                  "filePath": "path/to/collection1.json"
              },
              {
                  "filePath": "path/to/collection2.json"
              }
          ],
          "branch": "develop"
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: json
    content: |-
      {
          "type": "instanceNotFoundError",
          "title": "We could not find the API you are looking for",
          "detail": "We could not find the API you are looking for."
      }
order: 12000

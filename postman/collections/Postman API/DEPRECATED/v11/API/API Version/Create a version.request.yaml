$kind: http-request
description: |-
  Creates a new API version asynchronously and immediately returns an HTTP `202 Accepted` response. The response contains a polling link to the task status API in the `Location` header.

  This endpoint is equivalent to publishing a version in Postman app, which is the snapshot of API collections and schema at a given point in time.

  Include the following properties in the request body:

  - `name` — A **string** value that contains the version name.
      
  - `collections` — An **array** containing the collection unique IDs to publish.
      
  - `schemas` — An **array** containing the schema IDs to publish.
      
  - `branch` — A **string** value that contains the name of the repository branch. This property is required only for Git-linked APIs.
      

  You can include the following optional properties:

  - `releaseNotes` — A **string** value that contains the Markdown-supported version summary.
url: "{{baseUrl}}/apis/:apiId/versions"
method: POST
headers:
  - key: Accept
    value: application/vnd.api.v10+json
    description: The request header required to use the endpoint.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "enum": [
              "application/vnd.api.v10+json"
            ],
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
pathVariables:
  - key: apiId
    value: "{{apiId}}"
    description: The API's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "name": "{{apiReleaseName}}",
        "releaseNotes": "{{apiReleaseDescription}}",
        "collections": [
            {
                "id": "{{collectionUid}}"
            }
        ],
        "schemas": [
            {
                "id": "{{schemaId}}"
            }
        ]
    }
  $type: |-
    {
        "type": "object",
        "anyOf": [
            {
                "title": "Create Version Schema (Not Git-Linked)",
                "description": "Information about the API version.",
                "type": "object",
                "required": [
                    "name",
                    "schemas",
                    "collections"
                ],
                "properties": {
                    "name": {
                        "type": "string",
                        "description": "The version's name."
                    },
                    "schemas": {
                        "type": "array",
                        "description": "A list of the version's schemas.",
                        "items": {
                            "type": "object",
                            "description": "Information about the schema.",
                            "properties": {
                                "id": {
                                    "type": "string",
                                    "description": "The schema's ID."
                                }
                            }
                        }
                    },
                    "collections": {
                        "type": "array",
                        "description": "A list of the version's collections.",
                        "items": {
                            "type": "object",
                            "description": "Information about the collection.",
                            "properties": {
                                "id": {
                                    "type": "string",
                                    "description": "The collection's ID."
                                }
                            }
                        }
                    },
                    "releaseNotes": {
                        "type": "string",
                        "description": "Information about the API version release. For example, changelog notes."
                    }
                }
            },
            {
                "title": "Create Version Schema (Git-Linked)",
                "description": "Information about the API version.",
                "type": "object",
                "required": [
                    "name",
                    "branch",
                    "schemas",
                    "collections"
                ],
                "properties": {
                    "name": {
                        "type": "string",
                        "description": "The version's name."
                    },
                    "branch": {
                        "type": "string",
                        "description": "The branch ID."
                    },
                    "schemas": {
                        "type": "array",
                        "description": "A list of the version's schemas.",
                        "items": {
                            "type": "object",
                            "description": "Information about the schema.",
                            "properties": {
                                "directoryPath": {
                                    "type": "string",
                                    "description": "The path to the root directory where schemas are stored in the Git repository."
                                }
                            }
                        }
                    },
                    "collections": {
                        "type": "array",
                        "description": "A list of the version's collections.",
                        "items": {
                            "type": "object",
                            "description": "Information about the collection.",
                            "properties": {
                                "filePath": {
                                    "type": "string",
                                    "description": "The path to the collection in the Git repository."
                                }
                            }
                        }
                    },
                    "releaseNotes": {
                        "type": "string",
                        "description": "Information about the API version release. For example, changelog notes."
                    }
                }
            },
            {
                "title": "Create Version Schema (Git-Linked with root File)",
                "description": "Information about the API version.",
                "type": "object",
                "required": [
                    "name",
                    "branch",
                    "schemas",
                    "collections"
                ],
                "properties": {
                    "name": {
                        "type": "string",
                        "description": "The version's name."
                    },
                    "branch": {
                        "type": "string",
                        "description": "The branch ID."
                    },
                    "schemas": {
                        "type": "array",
                        "description": "A list of the version's schemas.",
                        "items": {
                            "type": "object",
                            "description": "Information about the schema.",
                            "properties": {
                                "filePath": {
                                    "type": "string",
                                    "description": "The path to the schema root file in the Git repository."
                                }
                            }
                        }
                    },
                    "collections": {
                        "type": "array",
                        "description": "A list of the version's collections.",
                        "items": {
                            "type": "object",
                            "description": "Information about the collection.",
                            "properties": {
                                "filePath": {
                                    "type": "string",
                                    "description": "Path to a collection in the Git repository."
                                }
                            }
                        }
                    },
                    "releaseNotes": {
                        "type": "string",
                        "description": "Information about the API version release. For example, changelog notes."
                    }
                }
            }
        ]
    }
examples: ./.resources/Create a version.resources/examples
order: 1000

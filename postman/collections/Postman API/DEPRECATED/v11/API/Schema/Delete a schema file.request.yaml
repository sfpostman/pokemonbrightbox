$kind: http-request
description: Deletes a file in an API schema. On success, this returns an HTTP `204 No Content` response.
url: "{{baseUrl}}/apis/:apiId/schemas/:schemaId/files/:filePath"
method: DELETE
headers:
  - key: Accept
    value: application/vnd.api.v10+json
    description: The request header required to use the endpoint.
pathVariables:
  - key: apiId
    value: "{{apiId}}"
    description: The API's ID.
  - key: schemaId
    value: "{{schemaId}}"
    description: The API schema's ID.
  - key: filePath
    value: "{{filePath}}"
    description: The path to the schema file.
examples: ./.resources/Delete a schema file.resources/examples
order: 6000

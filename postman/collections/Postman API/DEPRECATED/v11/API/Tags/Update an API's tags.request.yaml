$kind: http-request
description: |-
  Gets all the tags associated with an API. This endpoint replaces all existing tags with those you pass in the request body.

  **Note:**

  - You can only add a maximum of five tags to an API.
  - Tags must be between 2 and 64 characters long.
      
  - Tags must follow the `^[a-z][a-z0-9-]\\\\\*[a-z0-9]+$` pattern.
url: "{{baseUrl}}/apis/:apiId/tags"
method: PUT
headers:
  - key: Accept
    value: application/vnd.api.v10+json
    description: The request header required to use the endpoint.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
pathVariables:
  - key: apiId
    value: "{{apiId}}"
    description: The API's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "tags": [
            {
                "slug": "{{tagName}}"
            }
        ]
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "tags": {
                "type": "array",
                "minItems": 0,
                "maxItems": 5,
                "description": "A list of the associated tags as slugs.",
                "items": {
                    "type": "object",
                    "description": "Information about the tag.",
                    "properties": {
                        "slug": {
                            "type": "string",
                            "pattern": "^[a-z][a-z0-9-]*[a-z0-9]+$",
                            "minLength": 2,
                            "maxLength": 64,
                            "description": "The tag's ID within a team or individual (non-team) user scope."
                        }
                    }
                }
            }
        }
    }
settings:
  disabledSystemHeaders:
    - accept
examples: ./.resources/Update an API's tags.resources/examples
order: 2000

$kind: http-request
description: Gets all the tags associated with an API.
url: "{{baseUrl}}/apis/:apiId/tags"
method: GET
headers:
  - key: Accept
    value: application/vnd.api.v10+json
    description: The request header required to use the endpoint.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
pathVariables:
  - key: apiId
    value: "{{apiId}}"
    description: The API's ID.
settings:
  disabledSystemHeaders:
    - accept
examples: ./.resources/Get an API's tags.resources/examples
order: 1000

$kind: http-example
request:
  url: https://api.getpostman.com/apis/:apiId
  method: PUT
  headers:
    Accept: application/vnd.api.v10+json
  pathVariables:
    apiId: 5360b75f-447e-467c-9299-12fd6c92450d
  body:
    type: json
    content: |-
      {
          "name": "Test API A",
          "summary": "Test API A Schema",
          "description": "This is Test API A."
      }
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "type": "forbiddenError",
          "title": "You are not permitted to perform the action.",
          "detail": "You do not have access to perform this operation."
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "description": "The type of error."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              }
          }
      }
order: 3000

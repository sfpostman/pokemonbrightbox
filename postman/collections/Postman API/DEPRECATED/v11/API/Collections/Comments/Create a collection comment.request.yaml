$kind: http-request
description: |-
  Creates a comment on an API's collection. To create a reply on an existing comment, include the `threadId` property in the request body.

  Include the following in request body:

  - `body` — (Required) A **string** that contains the comment.
      
  - `threadId` — An **integer** that contains the comment's thread ID.
      
  - `tags` — An **object** that contains information about users tagged in the `body` comment. Include the following in this object:
      
      - `userName` — (Required) An **object** that contains information about the tagged user. The object's name is the user's Postman username. For example, `@user-postman`. Include the following in this object:
          
          - `type` — (Required) A **string** that contains the `user` value.
              
          - `id` — (Required) An **integer** that contains the user's ID.
              

  **Note:**

  This endpoint accepts a max of 10,000 characters.
url: "{{baseUrl}}/apis/:apiId/collections/:collectionId/comments"
method: POST
pathVariables:
  - key: apiId
    value: "{{apiId}}"
    description: The API's ID.
  - key: collectionId
    value: "{{collectionUid}}"
    description: The collection's unique ID.
body:
  type: json
  content: |-
    {
        "body": "{{comment}}",
        "threadId": {{threadId}},
        "tags": {
            "{{userName}}": {
                "type": "user",
                "id": "{{userId}}"
            }
        }
    }
examples: ./.resources/Create a collection comment.resources/examples
order: 2000

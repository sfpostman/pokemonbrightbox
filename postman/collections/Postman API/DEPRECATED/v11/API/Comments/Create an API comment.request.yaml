$kind: http-request
description: |-
  Creates a comment on an API. Include the following in request body:

  - `body` — (Required) A **string** that contains the comment.
      
  - `threadId` — An **integer** that contains the comment's thread ID.
      
  - `tags` — An **object** that contains information about users tagged in the `body` comment. Include the following in this object:
      
      - `userName` — (Required) An **object** that contains information about the tagged user. The object's name is the user's Postman username. For example, `@user-postman`. Include the following in this object:
          
          - `type` — (Required) A **string** that contains the `user` value.
              
          - `id` — (Required) An **integer** that contains the user's ID.
              

  **Note:**

  This endpoint accepts a max of 10,000 characters.
url: "{{baseUrl}}/apis/:apiId/comments"
method: POST
pathVariables:
  - key: apiId
    value: "{{apiId}}"
    description: The API's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "body": "{{comment}}",
        "threadId": {{threadId}},
        "tags": {
            "{{userName}}": {
                "type": "user",
                "id": "{{userId}}"
            }
        }
    }
  $type: |-
    {
        "type": "object",
        "required": ["body"],
        "properties": {
            "body": {
                "type": "string",
                "description": "The contents of the comment."
            },
            "threadId": {
                "type": "integer",
                "description": "The comment's thread ID. To create a reply on an existing comment, include this property."
            },
            "tags": {
                "type": "object",
                "description": "Information about users tagged in the `body` comment.",
                "properties": {
                    "{{userName}}": {
                        "type": "object",
                        "description": "An object that contains information about the tagged user. The object's name is the user's Postman username. For example, `@user-postman`.",
                        "properties": {
                            "type": {
                                "type": "string",
                                "description": "The `user` value.",
                                "enum": ["user"]
                            },
                            "id": {
                                "type": "string",
                                "description": "The user's ID."
                            }
                        }
                    }
                }
            }
        }
    }
examples: ./.resources/Create an API comment.resources/examples
order: 2000

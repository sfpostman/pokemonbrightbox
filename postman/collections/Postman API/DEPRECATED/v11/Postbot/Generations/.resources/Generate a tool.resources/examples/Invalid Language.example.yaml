$kind: http-example
request:
  url: https://api.getpostman.com/postbot/generations/tool
  method: POST
  body:
    type: json
    content: |-
      {
          "collectionId": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
          "requestId": "c82dd02c-4870-4907-8fcb-593a876cf05b",
          "config": {
              "language": "js",
              "agentFramework": "openai"
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": "\"body.config.language\" must be one of [javascript, typescript]"
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              }
          }
      }
order: 5000

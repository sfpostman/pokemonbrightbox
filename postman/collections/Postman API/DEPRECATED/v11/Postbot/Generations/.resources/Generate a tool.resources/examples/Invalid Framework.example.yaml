$kind: http-example
request:
  url: https://api.getpostman.com/postbot/generations/tool
  method: POST
  body:
    type: json
    content: |-
      {
          "collectionId": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
          "requestId": "c82dd02c-4870-4907-8fcb-593a876cf05b",
          "config": {
              "language": "javascript",
              "agentFramework": "postman"
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": "\"body.config.agentFramework\" must be one of [openai, mistral, gemini, anthropic, langchain, autogen]"
      }
order: 4000

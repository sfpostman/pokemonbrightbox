$kind: http-request
description: |-
  **This endpoint is deprecated in Postman v10 and higher.**

  Gets all of an API version's test relations.
url: https://api.getpostman.com/apis/{{apiId}}/versions/{{apiVersionId}}/test
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Get all test relations.resources/examples
order: 7000

$kind: http-request
description: |-
  **This endpoint is deprecated in Postman v10 and higher.**

  Gets an API version's documentation relations.
url: https://api.getpostman.com/apis/{{apiId}}/versions/{{apiVersionId}}/documentation
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Get  documentation relations.resources/examples
order: 3000

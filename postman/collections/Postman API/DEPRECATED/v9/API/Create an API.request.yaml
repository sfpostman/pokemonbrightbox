$kind: http-request
description: |-
  Creates an API. Include the following properties in the `api` object:

  *   `name` — A **string** value that contains the API's name.
      

  You can include the following optional properties:

  *   `summary` — A **string** value that contains a summary of the API.
  *   `description` — A **string** value that contains the description of the API.
url: https://api.getpostman.com/apis
method: POST
headers:
  Content-Type: application/json
queryParams:
  - key: workspaceId
    value: "{{workspaceId}}"
    disabled: true
    description: |-
      Optional. The workspace ID in which to create the API.

      If you do not use this parameter, the system creates the API in the "My Workspace" workspace.
body:
  type: text
  content: |-
    {
        "api": {
            "name": "{{apiName}}",
            "summary": "{{apiSummary}}",
            "description": "{{apiDescription}}"
        }
    }
examples: ./.resources/Create an API.resources/examples
order: 6000

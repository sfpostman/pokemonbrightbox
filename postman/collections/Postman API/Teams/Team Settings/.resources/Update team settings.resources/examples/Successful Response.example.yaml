$kind: http-example
request:
  url: https://api.getpostman.com/teams/:teamId/settings
  method: PUT
  pathVariables:
    teamId: "123"
  body:
    type: json
    content: |-
      {
          "settings" : {
              "rfa_for_add_member": "enabled",
              "rfa_for_add_collaborator": "enabled"
          }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "settings": {
              "rfa_for_add_member": "enabled",
              "rfa_for_add_collaborator": "enabled"
          }
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "settings": {
                  "type": "object",
                  "properties": {
                      "rfa_for_add_member": {
                          "type": "string",
                          "description": "If enabled, admins must approve any new team members before they can join."
                      },
                      "rfa_for_add_collaborator": {
                          "type": "string",
                          "description": "If enabled, collaborators require approval before they can access the team's workspaces."
                      }
                  }
              }
          }
      }
order: 1000

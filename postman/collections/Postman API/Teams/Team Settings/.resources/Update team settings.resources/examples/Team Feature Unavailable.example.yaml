$kind: http-example
request:
  url: https://api.getpostman.com/teams/:teamId/settings
  method: PUT
  pathVariables:
    teamId: "123"
  body:
    type: json
    content: |-
      {
          "settings" : {
              "rfa_for_add_member": "enabled",
              "rfa_for_add_collaborator": "enabled"
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": {
              "error": {
                  "name": "BadRequest",
                  "message": "Team feature is not available for your organization."
              }
          },
          "instance": "/teams"
      }
order: 2000

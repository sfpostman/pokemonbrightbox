$kind: http-request
description: Updates a team's settings.
url: "{{baseUrl}}/teams/:teamId/settings"
method: PUT
pathVariables:
  - key: teamId
    value: ""
    description: The team's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "settings" : {
            "rfa_for_add_member": "{{value}}",
            "rfa_for_add_collaborator": "{{value}}"
        }
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "settings": {
                "type": "object",
                "properties": {
                    "rfa_for_add_member": {
                        "type": "string",
                        "enum": ["enabled", "disabled"],
                        "description": "If enabled, admins must approve any new team members before they can join."
                    },
                    "rfa_for_add_collaborator": {
                        "type": "string",
                        "enum": ["enabled", "disabled"],
                        "description": "If enabled, collaborators require approval before they can access the team's workspaces."
                    }
                }
            }
        }
    }
examples: ./.resources/Update team settings.resources/examples
order: 1000

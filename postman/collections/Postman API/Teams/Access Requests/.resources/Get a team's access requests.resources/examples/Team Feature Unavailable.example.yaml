$kind: http-example
request:
  url: https://api.getpostman.com/teams/:teamId/access-requests
  method: GET
  headers:
    - key: identifierType
      value: scim
      description: Use SCIM user and group IDs instead of Postman user IDs.
  pathVariables:
    - key: teamId
      value: "123"
      description: The team's ID.
  body:
    type: json
    content: ""
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": {
              "error": {
                  "name": "BadRequest",
                  "message": "Team feature is not available for your organization."
              }
          },
          "instance": "/teams"
      }
order: 3000

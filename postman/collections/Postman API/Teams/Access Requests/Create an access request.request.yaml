$kind: http-request
description: |-
  Creates an access request for a team. Access requests include actions such as request to join a team, upgrading a user's role, adding members, and requesting team role access to another team.

  **Note:**

  If a team discovery is enabled, the team's access request is automatically approved.
url: "{{baseUrl}}/teams/:teamId/access-requests"
method: POST
headers:
  - key: identifierType
    value: scim
    disabled: true
    description: Use SCIM user and group IDs instead of Postman user IDs.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "enum": [
              "scim"
            ]
          }
        }
      }
pathVariables:
  - key: teamId
    value: ""
    description: The team's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "entityList": [
            {
                "entityType": "{{entityType}}",
                "entityId": "{{entityId}}"
            }
        ],
        "role": "{{entityRole}}",
        "reason": "{{reason}}",
        "requestType": "{{reasonType}}"
    }
  $type: |-
    {
        "type": "object",
        "required": [
            "entityList",
            "role",
            "reason",
            "requestType"
        ],
        "properties": {
            "entityList": {
                "type": "array",
                "description": "A list of the entities for which to create access requests.",
                "items": {
                    "type": "object",
                    "required": [
                        "entityType",
                        "entityId"
                    ],
                    "properties": {
                        "entityType": {
                            "type": "string",
                            "enum": [
                                "user",
                                "team",
                                "group",
                                "organization"
                            ],
                            "description": "The entity type."
                        },
                        "entityId": {
                            "type": "string",
                            "description": "The entity's ID."
                        }
                    }
                }
            },
            "role": {
                "type": "string",
                "description": "The team role to request.",
                "enum": [
                    "TEAM_MANAGER",
                    "TEAM_DEVELOPER",
                    "TEAM_GUEST_DEVELOPER",
                    "TEAM_GUEST_VIEWER",
                    "TEAM_PARTNER_MANAGER",
                    "TEAM_PARTNER_LEAD",
                    "TEAM_GUEST",
                    "TEAM_PARTNER",
                    "TEAM_COMMUNITY_MANAGER"
                ]
            },
            "reason": {
                "type": "string",
                "description": "The reason for the access request."
            },
            "requestType": {
                "type": "string",
                "description": "The type of access request.",
                "enum": [
                    "REQUEST_TO_ADD_MEMBERS",
                    "REQUEST_TO_JOIN",
                    "UPGRADE_ROLE"
                ]
            }
        }
    }
examples: ./.resources/Create an access request.resources/examples
order: 1000

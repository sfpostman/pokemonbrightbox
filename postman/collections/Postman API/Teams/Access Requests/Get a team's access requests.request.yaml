$kind: http-request
description: Gets a team's pending access requests.
url: "{{baseUrl}}/teams/:teamId/access-requests"
method: GET
headers:
  - key: identifierType
    value: scim
    disabled: true
    description: Use SCIM user and group IDs instead of Postman user IDs.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "enum": [
              "scim"
            ]
          }
        }
      }
queryParams:
  - key: cursor
    value: ""
    disabled: true
    description: The pointer to the first record of the set of paginated results. To view the next response, use the `nextCursor` value for this parameter.
    $type: string
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of rows to return in the response.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": "50"
          }
        }
      }
pathVariables:
  - key: teamId
    value: ""
    description: The team's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: ""
examples: ./.resources/Get a team's access requests.resources/examples
order: 3000

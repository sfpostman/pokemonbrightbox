$kind: collection
description: |-
  The **Teams** endpoints enable you to manage your [organization](https://learning.postman.com/docs/administration/managing-your-team/overview)'s teams.

  **Note:**

  - These endpoints are only available with [Postman Enterprise plans](https://www.postman.com/pricing/) with [Postman Organizations](https://learning.postman.com/docs/administration/onboarding-checklist) enabled.
      
  - You must have [Super Admin team role](https://learning.postman.com/docs/collaborating-in-postman/roles-and-permissions/#team-roles) to use these endpoints.
      
  - Use the `identifierType=scim` header in these requests (except the **Team Settings** endpoints) to use SCIM user and group IDs instead of Postman user and group IDs.
order: 19000

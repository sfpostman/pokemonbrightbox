$kind: http-example
request:
  url: https://api.getpostman.com/teams/:teamId
  method: GET
  pathVariables:
    teamId: "123"
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/not-found",
          "status": 404,
          "title": "Not Found",
          "detail": {
              "error": {
                  "name": "EntityNotFound",
                  "message": "No team found with the id provided"
              }
          },
          "instance": "/teams/12345"
      }
order: 5000

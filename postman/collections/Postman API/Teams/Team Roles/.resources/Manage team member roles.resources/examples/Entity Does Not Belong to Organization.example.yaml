$kind: http-example
request:
  url: https://api.getpostman.com/teams/:teamId/bulk-members
  method: POST
  headers:
    - key: identifierType
      value: scim
      disabled: true
      description: Use SCIM user and group IDs instead of Postman user IDs.
  pathVariables:
    - key: teamId
      value: "123"
      description: The team's ID.
  body:
    type: json
    content: |-
      {
          "add": {
              "users": {
                  "12345678": [
                      "TEAM_DEVELOPER"
                  ]
              }
          },
          "remove": {
              "users": {
                  "56781234": [
                      "TEAM_DEVELOPER"
                  ]
              },
              "groups": {
                  "1234": [
                      "TEAM_DEVELOPER"
                  ]
              }
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": {
              "error": {
                  "name": "BadRequest",
                  "message": "User with ID [12345678] does not belong to organization 1."
              }
          },
          "instance": "/teams/123/members"
      }
order: 11000

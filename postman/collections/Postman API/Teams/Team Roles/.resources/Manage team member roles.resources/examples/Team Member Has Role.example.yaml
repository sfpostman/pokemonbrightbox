$kind: http-example
request:
  url: https://api.getpostman.com/teams/:teamId/bulk-members
  method: POST
  pathVariables:
    teamId: "123"
  body:
    type: json
    content: |-
      {  
          "add": {
              "users": { 
                  "12345678": [
                      "TEAM_DEVELOPER"
                  ]
              }
          }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "result": [
              {
                  "entityType": "user",
                  "entityId": 12345678,
                  "role": "TEAM_DEVELOPER",
                  "status": "Skipped",
                  "reason": "Entity has this role"
              }
          ]
      }
order: 9000

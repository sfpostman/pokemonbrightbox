  method: POST
  pathVariables:
    - key: teamId
      value: "123"
      description: The team's ID.
  body:
    type: json
    content: |-
      {
          "add": {
              "users": {
                  "123": [
                      "TEAM_DEVELOPER"
                  ]
              }
          },
          "remove": {
              "users": {
                  "456": [
                      "TEAM_DEVELOPER"
                  ]
              },
              "groups": {
                  "998": [
                      "TEAM_DEVELOPER"
                  ]
              }
          }
      }

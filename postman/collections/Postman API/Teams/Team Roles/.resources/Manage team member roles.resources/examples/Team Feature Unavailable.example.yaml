  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/bad-request",
          "status": 400,
          "title": "Bad Request",
          "detail": {
              "error": {
                  "name": "BadRequest",
                  "message": "Team feature is not available for your organization."
              }
          },
          "instance": "/teams"
      }
order: 12000

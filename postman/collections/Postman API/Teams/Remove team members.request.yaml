$kind: http-request
description: Removes entities, such as users or organizations, from your Postman team. On success, this returns an HTTP `204 No Content` response.
url: "{{baseUrl}}/teams/:teamId/bulk-members"
method: DELETE
headers:
  - key: identifierType
    value: scim
    disabled: true
    description: Use SCIM user and group IDs instead of Postman user IDs.
pathVariables:
  - key: teamId
    value: ""
    description: The team's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "deprecated": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "entities": [
            {
                "entityType": "{{entityType}}",
                "entityId": "{{entityId}}"
            }
        ]
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "entities": {
                "type": "array",
                "description": "A list of entities to remove.",
                "items": {
                    "type": "object",
                    "properties": {
                        "entityType": {
                            "type": "string",
                            "enum": ["user", "team", "group", "organization"],
                            "description": "The entity type."
                        },
                        "entityId": {
                            "type": "string",
                            "description": "The entity's ID."
                        }
                    }
                }
            }
        }
    }
examples: ./.resources/Remove team members.resources/examples
order: 7000

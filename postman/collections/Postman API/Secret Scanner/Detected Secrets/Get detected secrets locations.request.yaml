$kind: http-request
description: Gets the locations of secrets detected by Postman's [Secret Scanner](https://learning.postman.com/docs/administration/secret-scanner/).
url: "{{baseUrl}}/detected-secrets/:secretId/locations?workspaceId="
method: GET
queryParams:
  - key: workspaceId
    value: ""
    description: The workspace's ID.
  - key: resourceType
    value: ""
    disabled: true
    description: |-
      Return only results that match the given resource type. One of:
      - `collection`
      - `environment`
      - `extensible-collection`
      - `globals`
      - `example`
      - `request`
      - `folder`
      - `extensible-collection-meta`
      - `extensible-request`
      - `extensible-folder`
      - `extensible-example`
      - `extensible-message`
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of rows to return in the response.
  - key: cursor
    value: ""
    disabled: true
    description: The pointer to the first record of the set of paginated results.
  - key: since
    value: ""
    disabled: true
    description: |-
      Return only results created since the given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be later than the `until` value.

      To use time-numoffset format, you must use `%2B` URL-encoding for the `+` character.
  - key: until
    value: ""
    disabled: true
    description: |-
      Return only results created until this given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be earlier than the `since` value.

      To use time-numoffset format, you must use `%2B` URL-encoding for the `+` character.
pathVariables:
  - key: secretId
    value: ""
    description: The secret's ID.
examples: ./.resources/Get detected secrets locations.resources/examples
order: 2000

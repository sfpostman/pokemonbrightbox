$kind: http-request
description: Updates the resolution status of a secret detected in a workspace.
url: "{{baseUrl}}/detected-secrets/:secretId"
method: PUT
pathVariables:
  - key: secretId
    value: ""
    description: The secret's ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "resolution": "{{secretResolutionStatus}}",
        "workspaceId": "{{workspaceId}}"
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "resolution": {
                "type": "string",
                "description": "The secret's updated resolution status:\n- `FALSE_POSITIVE` — The discovered secret is not an actual secret.\n- `REVOKED` — The secret is valid, but the user rotated their key to resolve the issue.\n- `ACCEPTED_RISK` — The Secret Scanner found the secret, but user accepts the risk of publishing it.\n",
                "enum": ["FALSE_POSITIVE", "REVOKED", "ACCEPTED_RISK"]
            },
            "workspaceId": {
                "type": "string",
                "description": "The ID of the workspace that contains the secret."
            }
        }
    }
examples: ./.resources/Update detected secret resolution status.resources/examples
order: 1000

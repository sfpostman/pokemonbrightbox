$kind: http-request
description: |-
  Returns all secrets detected by Postman's [Secret Scanner](https://learning.postman.com/docs/administration/secret-scanner/), grouped by workspace or resource. If you pass an empty request body, this endpoint returns all results.

  You can include the following properties in the request body:

  - `secretTypes` — An **array** that contains a list of secrets types to query. For a list of valid IDs, use the GET `/secret-types` endpoint.
      
  - `resolved` — A **boolean** value that, if true, return secrets with a `resolved` status.
      
  - `statuses` — An **array** that contains a list of the secret resolution status type:
      
      - `FALSE_POSITIVE` — The discovered secret is not an actual secret.
          
      - `REVOKED` — The secret is valid, but the user rotated their key to resolve the issue.
          
      - `ACCEPTED_RISK` — The Secret Scanner found the secret, but user accepts the risk of publishing it.
          
  - `resources` — An **array of objects** that contains a list of resources to query:
      
      - `type` — The type of resource:
          
          - `collection`
              
          - `environment`
              
          - `extensible-collection`
              
          - `globals`
              
          - `example`
              
          - `request`
              
          - `folder`
              
          - `extensible-collection-meta`
              
          - `extensible-request`
              
          - `extensible-folder`
              
          - `extensible-example`
              
          - `extensible-message`
              
          - `api-definition-file`
              
          - `api-definition`
              
      - `ids` — An **array of string** containing the element IDs to search.
          
  - `workspaceIds` — An **array** that contains a list of workspaces IDs to query.
      
  - `workspaceVisibilities` — An **array** that contains a list of workspace [visibility settings](https://learning.postman.com/docs/collaborating-in-postman/using-workspaces/managing-workspaces/#changing-workspace-visibility) to query. This currently supports the `team` and `public` settings.
      

  **Note:**

  The `workspaceIds` and `resources` properties are mutually exclusive. You can only use one in a request. If you pass both, the API returns an HTTP 400 `Bad Request` response.
url: "{{baseUrl}}/detected-secrets-queries"
method: POST
queryParams:
  - key: include
    value: ""
    disabled: true
    description: |-
      The additional fields to be included as a part of the request:
      - `meta.total` — Include the total records found in the `meta` response object.
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of rows to return in the response.
  - key: cursor
    value: ""
    disabled: true
    description: The pointer to the first record of the set of paginated results.
  - key: since
    value: ""
    disabled: true
    description: |-
      Return only results created since the given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be later than the `until` value.

      To use time-numoffset format, you must use `%2B` URL-encoding for the `+` character.
  - key: until
    value: ""
    disabled: true
    description: |-
      Return only results created until this given time, in [ISO 8601](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) format. This value cannot be earlier than the `since` value.

      To use time-numoffset format, you must use `%2B` URL-encoding for the `+` character.
body:
  type: json
  content: |-
    {
        "secretTypes": [
            "{{secretTypeIds}}"
        ],
        "resolved": true,
        "statuses": [
            "{{secretStatuses}}"
        ],
        "resources": [
            {
                "type": "{{resourceType}}",
                "ids": [
                    "{{resourceID}}"
                ]
            }
        ],
        "workspaceIds": [
            "{{workspaceIds}}"
        ],
        "workspaceVisibilities": [
            "{{workspaceVisibility}}"
        ]
    }
examples: ./.resources/Search detected secrets.resources/examples
order: 3000

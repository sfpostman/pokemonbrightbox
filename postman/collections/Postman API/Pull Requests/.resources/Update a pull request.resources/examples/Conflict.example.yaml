$kind: http-example
request:
  url: https://api.getpostman.com/pull-requests/:pullRequestId
  method: PUT
  pathVariables:
    pullRequestId: 4e1a6609-1a29-4037-a411-89ecc14c6cd8
  body:
    type: json
    content: |-
      {
          "title": "Updated PR title",
          "description": "Updated description of the pull request.",
          "reviewers": [
              "12345678",
              "87654321"
          ]
      }
response:
  statusCode: 409
  statusText: Conflict
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/conflict",
          "title": "Conflict",
          "detail": "You cannot modify a pull request which is already merged or declined.",
          "status": 409
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              }
          }
      }
order: 3000

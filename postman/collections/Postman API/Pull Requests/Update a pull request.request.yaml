$kind: http-request
description: Updates an open pull request.
url: "{{baseUrl}}/pull-requests/:pullRequestId"
method: PUT
pathVariables:
  - key: pullRequestId
    value: ""
    description: The pull request's ID.
body:
  type: json
  content: |-
    {
        "title": "{{pullRequestTitle}}",
        "description": "{{pullRequestDescription}}",
        "reviewers": [
            "{{userId}}"
        ]
    }
examples: ./.resources/Update a pull request.resources/examples
order: 3000

$kind: http-example
request:
  url: https://api.getpostman.com/mocks/:mockId
  method: GET
  pathVariables:
    mockId: 12345678-e3d951bf-873f-49ac-a658-b2dcb91d3289
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "forbiddenError",
              "message": "You don't have access to this mock."
          }
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "error": {
                  "type": "object",
                  "properties": {
                      "name": {
                          "type": "string",
                          "description": "The error name."
                      },
                      "message": {
                          "type": "string",
                          "description": "The error message."
                      }
                  }
              }
          }
      }
order: 2000

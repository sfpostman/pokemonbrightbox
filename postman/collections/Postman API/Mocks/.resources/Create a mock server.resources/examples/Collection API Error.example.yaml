$kind: http-example
request:
  url: https://api.getpostman.com/mocks
  method: POST
  body:
    type: json
    content: |-
      {
      	"mock": {
              "name": "Test Mock",
      		"collection": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2",
      		"environment": "12345678-5daabc50-8451-43f6-922d-96b403b4f28e",
              "private": false
      	}
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "workspaceError",
              "message": "Can't create mock servers on a collection added to an API"
          }
      }
order: 3000

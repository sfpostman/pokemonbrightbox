$kind: http-example
request:
  url: https://api.getpostman.com/mocks/:mockId/server-responses/:serverResponseId
  method: GET
  pathVariables:
    mockId: 12345678-e3d951bf-873f-49ac-a658-b2dcb91d3289
    serverResponseId: 965cdd16-fe22-4d96-a161-3d05490ac421
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "mockNotFoundError",
              "header": "Unable to find mock",
              "message": "Please refresh and try again."
          }
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "error": {
                  "type": "object",
                  "properties": {
                      "name": {
                          "type": "string",
                          "description": "The error name."
                      },
                      "header": {
                          "type": "string",
                          "description": "Information about the error."
                      },
                      "message": {
                          "type": "string",
                          "description": "The error message."
                      }
                  }
              }
          }
      }
order: 3000

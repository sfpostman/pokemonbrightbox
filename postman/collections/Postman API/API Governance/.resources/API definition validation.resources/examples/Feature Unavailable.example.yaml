$kind: http-example
request:
  url: https://api.eu.postman.com/security/api-validation
  method: POST
  body:
    type: json
    content: |-
      {
          "schema": {
              "type": "openapi3",
              "language": "yaml",
              "schema": "openapi: '\"3.1.0'\"\ninfo:\n  version: '\"1.0.0'\"\n  title: '\"Sample API'\"\n  description: Buy or rent spacecrafts\n\npaths:\n  /spacecrafts/{spacecraftId}:\n    parameters:\n      - name: spacecraftId\n        description: The unique identifier of the spacecraft\n        in: path\n        required: true\n        schema:\n          $ref: '\"#/components/schemas/SpacecraftId'\"\n    get:\n      summary: Read a spacecraft\n      responses:\n        '\"200'\":\n          description: The spacecraft corresponding to the provided `spacecraftId`\n          content:\n            application/json:\n              schema:\n                $ref: '\"#/components/schemas/Spacecraft'\"\n        404:\n          description: No spacecraft found for the provided `spacecraftId`\n          content:\n            application/json:\n              schema:\n                $ref: '\"#/components/schemas/Error'\"\n        500:\n          description: Unexpected error\n          content:\n            application/json:\n              schema:\n                $ref: '\"#/components/schemas/Error'\"\ncomponents:\n  schemas:\n    SpacecraftId:\n      description: The unique identifier of a spacecraft\n      type: string\n    Spacecraft:\n      type: object\n      required:\n        - id\n        - name\n        - type\n      properties:\n        id:\n          $ref: '\"#/components/schemas/SpacecraftId'\"\n        name:\n          type: string\n        type:\n          type: string\n          enum:\n            - capsule\n            - probe\n            - satellite\n            - spaceplane\n            - station\n        description:\n          type: string\n    Error:\n      type: object\n      required:\n        - message\n      properties:\n        message:\n          description: A human readable error message\n          type: string\n  securitySchemes:\n    ApiKey:\n      type: apiKey\n      in: header\n      name: X-Api-Key"
          }
      }
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "type": "https://api.postman.com/problems/forbidden",
          "title": "Forbidden",
          "status": 403,
          "detail": "This feature isn't available in your region."
      }
    $type: |-
      {
          "type": "object",
          "properties": {
              "type": {
                  "type": "string",
                  "format": "uri",
                  "description": "The [URI reference](https://www.rfc-editor.org/rfc/rfc3986) that identifies the type of problem."
              },
              "title": {
                  "type": "string",
                  "description": "A short summary of the problem."
              },
              "detail": {
                  "type": "string",
                  "description": "Information about the error."
              },
              "status": {
                  "type": "integer",
                  "description": "The error's HTTP status code."
              }
          }
      }
order: 5000

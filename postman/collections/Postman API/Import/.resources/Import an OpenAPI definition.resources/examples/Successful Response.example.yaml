$kind: http-example
request:
  url: https://api.getpostman.com/import/openapi
  method: POST
  body:
    type: json
    content: |-
      {
          "type": "json",
          "input": {
              "openapi": "3.0.0",
              "servers": [
                  {
                      "url": "example.com"
                  }
              ],
              "info": {
                  "contact": {
                      "name": "Jon"
                  },
                  "version": "1.0.0",
                  "title": "Sample API",
                  "description": "Buy or rent spacecrafts"
              },
              "paths": {
                  "/spacecrafts/{spacecraftId}": {
                      "parameters": [
                          {
                              "name": "spacecraftId",
                              "description": "The unique identifier of the spacecraft",
                              "in": "path",
                              "required": true,
                              "schema": {
                                  "$ref": "#/components/schemas/SpacecraftId"
                              }
                          }
                      ],
                      "get": {
                          "summary": "Read a spacecraft",
                          "responses": {
                              "200": {
                                  "description": "The spacecraft corresponding to the provided `spacecraftId`",
                                  "content": {
                                      "application/json": {
                                          "schema": {
                                              "$ref": "#/components/schemas/Spacecraft"
                                          }
                                      }
                                  }
                              },
                              "404": {
                                  "description": "No spacecraft found for the provided `spacecraftId`",
                                  "content": {
                                      "application/json": {
                                          "schema": {
                                              "$ref": "#/components/schemas/Error"
                                          }
                                      }
                                  }
                              },
                              "500": {
                                  "description": "Unexpected error",
                                  "content": {
                                      "application/json": {
                                          "schema": {
                                              "$ref": "#/components/schemas/Error"
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              },
              "components": {
                  "schemas": {
                      "SpacecraftId": {
                          "description": "The unique identifier of a spacecraft",
                          "type": "string"
                      },
                      "Spacecraft": {
                          "type": "object",
                          "required": [
                              "id",
                              "name",
                              "type"
                          ],
                          "properties": {
                              "id": {
                                  "$ref": "#/components/schemas/SpacecraftId"
                              },
                              "name": {
                                  "type": "string"
                              },
                              "type": {
                                  "type": "string",
                                  "enum": [
                                      "capsule",
                                      "probe",
                                      "satellite",
                                      "spaceplane",
                                      "station"
                                  ]
                              },
                              "description": {
                                  "type": "string"
                              }
                          }
                      },
                      "Error": {
                          "type": "object",
                          "required": [
                              "message"
                          ],
                          "properties": {
                              "message": {
                                  "description": "A human readable error message",
                                  "type": "string"
                              }
                          }
                      }
                  },
                  "securitySchemes": {
                      "ApiKey": {
                          "type": "apiKey",
                          "in": "header",
                          "name": "X-Api-Key"
                      }
                  }
              },
              "security": [
                  {
                      "ApiKey": []
                  }
              ]
          }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "collections": [
              {
                  "id": "12ece9e1-2abf-4edc-8e34-de66e74114d2",
                  "name": "Sample API",
                  "uid": "12345678-12ece9e1-2abf-4edc-8e34-de66e74114d2"
              }
          ]
      }
order: 1000

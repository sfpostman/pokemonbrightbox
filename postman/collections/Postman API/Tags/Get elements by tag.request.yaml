$kind: http-request
description: |-
  Gets Postman elements (entities) by a given tag. Tags enable you to organize and search [workspaces ](https://learning.postman.com/docs/collaborating-in-postman/using-workspaces/managing-workspaces/#tagging-a-workspace) and [collections](https://learning.postman.com/docs/collections/using-collections/#tagging-a-collection) that contain shared tags.

  **Note:**

  Tagging is available on [Postman Enterprise plans](https://www.postman.com/pricing/).
url: "{{baseUrl}}/tags/:slugId/entities"
method: GET
queryParams:
  - key: limit
    value: ""
    disabled: true
    description: The maximum number of tagged elements to return in a single call.
  - key: direction
    value: ""
    disabled: true
    description: The ascending (`asc`) or descending (`desc`) order to sort the results by, based on the time of the element's tagging.
  - key: cursor
    value: ""
    disabled: true
    description: |-
      The cursor to get the next set of results in the paginated response. Use the `nextCursor` value in the response's `meta` object for this value.

      If you pass an invalid value, the API only returns the first set of results.
  - key: entityType
    value: ""
    disabled: true
    description: |-
      Filter results for the given element type:
      - `collection`
      - `workspace`
pathVariables:
  - key: slugId
    value: ""
    description: The tag's ID within a team or individual (non-team) user scope. For example, "needs-review".
examples: ./.resources/Get elements by tag.resources/examples
order: 1000

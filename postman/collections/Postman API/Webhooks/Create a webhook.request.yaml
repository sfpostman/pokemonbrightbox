$kind: http-request
description: |-
  Creates a webhook that triggers a collection with a custom payload. You can get the webhook's URL from the `webhookUrl` property in the endpoint's response.

  **Note:**

  If you do not include the `workspace` query parameter, the system creates the webhook in the oldest personal Internal workspace you own.
url: "{{baseUrl}}/webhooks?workspace="
method: POST
queryParams:
  - key: workspace
    value: ""
    description: |-
      A workspace ID in which to create the webhook.

      If you do not include this parameter, the system creates the webhook in the oldest personal Internal workspace you own.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "deprecated": false,
            "uniqueItems": false
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
        "webhook":{
            "name": "{{webhookName}}",
            "collection": "{{collectionUid}}",
            "environment": "{{environmentUid}}"
        }
    }
  $type: |-
    {
        "type": "object",
        "properties": {
            "webhook": {
                "type": "object",
                "required": ["name", "collection"],
                "properties": {
                    "name": {
                        "type": "string",
                        "description": "The webhook's name. On success, the system creates a new monitor with this name in the **Monitors** tab."
                    },
                    "collection": {
                        "type": "string",
                        "description": "The unique ID of the collection to trigger when calling this webhook."
                    },
                    "environment": {
                        "type": "string",
                        "description": "The unique ID of the environment to trigger when calling this webhook."
                    }
                }
            }
        }
    }
examples: ./.resources/Create a webhook.resources/examples
order: 1000

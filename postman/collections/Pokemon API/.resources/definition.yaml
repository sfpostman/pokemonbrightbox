$kind: collection
description: |-
  A RESTful API for retrieving and managing Pokémon data sourced from the Pokédex.

  ## Architecture
  Requests are routed through an API Gateway (`localhost:3000`) which proxies to two microservices:
  - **Pokemon Service** (`localhost:3001`) — CRUD operations on Pokémon
  - **Types Service** (`localhost:3002`) — Type listings and filtering

  ## Pagination
  List endpoints support `limit` (default: 20) and `offset` (default: 0) query parameters.
variables:
  baseUrl: http://localhost:3000

$kind: http-example
request:
  url: "{{baseUrl}}/pokemon/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: id
      value: <string>
      description: Pokédex number (zero-padded, e.g. 0006)
  body:
    type: text
    content: ""
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "<string>"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "string"
          }
        }
      }
order: 2000

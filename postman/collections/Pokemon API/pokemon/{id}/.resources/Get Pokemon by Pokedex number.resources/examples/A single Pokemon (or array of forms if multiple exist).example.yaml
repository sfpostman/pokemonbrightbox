$kind: http-example
request:
  url: "{{baseUrl}}/pokemon/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: id
      value: <string>
      description: Pokédex number (zero-padded, e.g. 0006)
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "number": "<string>",
        "name": "<string>",
        "type": "<string>",
        "total": "<integer>",
        "hp": "<integer>",
        "attack": "<integer>",
        "defense": "<integer>",
        "sp_atk": "<integer>",
        "sp_def": "<integer>",
        "speed": "<integer>"
      }
order: 1000

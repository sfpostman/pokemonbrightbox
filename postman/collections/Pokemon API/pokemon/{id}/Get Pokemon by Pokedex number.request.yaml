$kind: http-request
url: "{{baseUrl}}/pokemon/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: <string>
    description: Pokédex number (zero-padded, e.g. 0006)
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Get Pokemon by Pokedex number.resources/examples
order: 1000

$kind: http-request
url: "{{baseUrl}}/pokemon/:id"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: <string>
    description: Pokédex number (zero-padded, e.g. 0006)
body:
  type: json
  content: |-
    {
      "name": "<string>",
      "type": "<string>",
      "total": "<integer>",
      "hp": "<integer>",
      "attack": "<integer>",
      "defense": "<integer>",
      "sp_atk": "<integer>",
      "sp_def": "<integer>",
      "speed": "<integer>"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Update a Pokemon.resources/examples
order: 2000

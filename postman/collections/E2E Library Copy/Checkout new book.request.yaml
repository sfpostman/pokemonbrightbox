$kind: http-request
description: |-
  Checks out a book by updating its `checkedOut` status to `true`.

  Uses the `bookId` collection variable set by the "Create a new book" request. This is the final step in the E2E workflow, confirming that a book can be successfully checked out after being created and verified.

  **NOTE (demo stub):** Tests on this request have been intentionally stripped down for the Agent Mode + Atlassian MCP demo. The full contract lives on the Confluence page "E2E Library — Postman Collection Reference" in Samuel Finlay's personal space. Run Prompt B from the demo script page to have Agent Mode regenerate the missing assertions.

  **Tests currently in place:**
  - Status code is `200`

  **Tests expected by the documented contract (to be regenerated):**
  - Response has `application/json` content type
  - `checkedOut` is `true` in the response
  - Returned `id` matches the `bookId` collection variable
url: "{{baseUrl}}/books/:id"
method: PATCH
headers:
  x-mock-response-code: "200"
  Content-Type: application/json
  Accept: application/json
pathVariables:
  id: "{{bookId}}"
body:
  type: json
  content: |-
    {
      "checkedOut": true
    }
scripts:
  - type: afterResponse
    code: |-
      // DEMO STUB: Only a status-code assertion is in place.
      // The full set of assertions is documented on the Confluence page
      // "E2E Library — Postman Collection Reference" in the personal space.
      // Use Agent Mode + Atlassian MCP (Prompt B) to regenerate them.

      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      // TODO (regenerate via Agent Mode):
      // - Response has application/json content type
      // - checkedOut is true after checkout
      // - Checked out book id matches bookId variable
    language: text/javascript
order: 4000

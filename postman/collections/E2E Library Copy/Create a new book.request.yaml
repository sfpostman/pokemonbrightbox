$kind: http-request
description: |-
  Creates a new book entry in the library.

  A unique title is generated dynamically using `Date.now()` and stored in the `tempBookTitle` collection variable before the request is sent. The author name is randomised using Postman dynamic variables. On a successful response, the returned `id` is saved to the `bookId` collection variable for use in downstream requests.

  **Tests run:**
  - Status code is `201`
  - Response has `application/json` content type
  - Response body contains all required fields: `id`, `title`, `author`, `genre`, `yearPublished`, `checkedOut`, `isPermanentCollection`, `createdAt`
  - `checkedOut` defaults to `false`
  - `id` is a non-empty string
  - `bookId` collection variable is set from the response
url: "{{baseUrl}}/books"
method: POST
headers:
  x-mock-response-code: "201"
  x-mock-response-name: Dynamic Variables Mock Demo
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "title": "{{tempBookTitle}}",
      "author": "{{$randomFirstName}} {{$randomLastName}}",
      "genre": "fiction",
      "yearPublished": "1967"
    }
scripts:
  - type: beforeRequest
    code: |-
      // Try to use the current row from the Pokedex dataset (when running via Collection Runner with dataset attached)
      let pokemonName = pm.iterationData.get("Name");

      // Fallback: pick a random name from an embedded list when not running with the dataset
      if (!pokemonName) {
          const fallbackNames = [
              "Bulbasaur", "Ivysaur", "Venusaur", "Charmander", "Charmeleon",
              "Charizard", "Squirtle", "Wartortle", "Blastoise", "Caterpie",
              "Metapod", "Butterfree", "Weedle", "Kakuna", "Beedrill",
              "Pidgey", "Pidgeotto", "Pidgeot", "Rattata", "Raticate",
              "Pikachu", "Raichu", "Sandshrew", "Sandslash", "Nidoran",
              "Jigglypuff", "Meowth", "Psyduck", "Growlithe", "Abra",
              "Machop", "Geodude", "Magnemite", "Gastly", "Onix",
              "Krabby", "Voltorb", "Exeggcute", "Cubone", "Hitmonlee",
              "Lickitung", "Koffing", "Rhyhorn", "Chansey", "Tangela",
              "Kangaskhan", "Horsea", "Goldeen", "Staryu", "Mr. Mime",
              "Scyther", "Jynx", "Electabuzz", "Magmar", "Pinsir",
              "Tauros", "Magikarp", "Gyarados", "Lapras", "Ditto",
              "Eevee", "Vaporeon", "Jolteon", "Flareon", "Porygon",
              "Snorlax", "Articuno", "Zapdos", "Moltres", "Dratini",
              "Mewtwo", "Mew"
          ];
          pokemonName = fallbackNames[Math.floor(Math.random() * fallbackNames.length)];
      }

      pm.collectionVariables.set("tempBookTitle", pokemonName + " " + Date.now());
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response body has required fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.all.keys("id", "title", "author", "genre", "yearPublished", "checkedOut", "isPermanentCollection", "createdAt");
      });

      pm.test("checkedOut defaults to false", function () {
          pm.expect(pm.response.json().checkedOut).to.be.false;
      });

      pm.test("id is a non-empty string", function () {
          pm.expect(pm.response.json().id).to.be.a("string").and.not.be.empty;
      });

      pm.test("Save bookId for downstream requests", function () {
          const json = pm.response.json();
          pm.expect(json.id).to.be.a("string");
          pm.collectionVariables.set("bookId", json.id);
      });
    language: text/javascript
order: 2000

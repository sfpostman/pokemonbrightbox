$kind: http-request
description: |-
  Retrieves the full list of books available in the library.

  This is the first step in the E2E workflow. It confirms the library API is reachable and returns a well-formed array of book objects.

  **Tests run:**
  - Status code is `200`
  - Response has `application/json` content type
  - Response body is an array
  - Each book contains all required fields: `id`, `title`, `author`, `genre`, `yearPublished`, `checkedOut`, `isPermanentCollection`, `createdAt`
url: "{{baseUrl}}/books"
method: GET
headers:
  - key: x-mock-response-code
    value: "500"
    $type: integer
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response is an array", function () {
          pm.expect(pm.response.json()).to.be.an("array");
      });

      pm.test("Each book has required fields", function () {
          pm.response.json().forEach(function (book) {
              pm.expect(book).to.have.all.keys("id", "title", "author", "genre", "yearPublished", "checkedOut", "isPermanentCollection", "createdAt");
          });
      });
    language: text/javascript
order: 1000
